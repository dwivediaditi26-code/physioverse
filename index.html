}

function assessDocHTML(id){
  if(!DB.assessments)return'';
  const c=DB.assessments.find(x=>x.id===id);if(!c)return'';
  const p=pById(c.pid);
  const ini=p.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);

  // Pain badge colour
  const pn=c.pain!=null?+c.pain:null;
  const painCls=pn===null?"":(pn<=3?"p-green":pn<=6?"p-amber":pn<=8?"p-red":"p-dark");
  const painHTML=pn!==null?`<span class="adoc-pain ${painCls}">⬤ Pain ${pn}/10</span>`:"";

  // Helper: only render if truthy
  const frow=(lbl,val)=>val?`<div class="adoc-row"><span class="adoc-lbl">${lbl}</span><span class="adoc-val">${val}</span></div>`:"";
  const chips=(arr,cls)=>arr.length?`<div class="adoc-chips">${arr.map(v=>`<span class="adoc-chip ${cls}">${v}</span>`).join("")}</div>`:"";

  // ── S: Subjective ──
  const sRows=[
    frow("Chief complaint",c.complaint),
    frow("Onset / mechanism",c.onset),
    frow("Pain site",c.painsite),
    frow("Aggravating factors",c.aggr),
    frow("Relieving factors",c.reliev),
    frow("History / medications",c.history)
  ].filter(Boolean).join("");

  // ── O: Objective — per region ──
  let regionBlocks="";
  (c.regions||[]).forEach(r=>{
    const rk=r.replace("/","_");
    const side=c.regionSides&&c.regionSides[r];
    const sideTag=side?` <span style="font-size:10px;padding:1px 7px;background:#1d4ed8;color:#fff;border-radius:20px;vertical-align:middle">${side==="B"?"Bilateral":side==="L"?"Left":"Right"}</span>`:"";

    // Observation
    const obsIdxs=c.obs&&c.obs[r]||[];
    const obsNames=(AOBS[r]||[]).filter((_,i)=>obsIdxs.includes(i));
    const obsHTML=obsNames.length?`<div class="adoc-sub-lbl">Observation</div>${chips(obsNames,"obs")}`:"";

    // Palpation — only tender ones
    const palpData=c.palp&&c.palp[r]||{};
    const palpItems=(APALP[r]||[]).map((pt,i)=>{const sv=palpData[i]||{};return sv.tender?`${pt.pt}${sv.side?" ("+sv.side+")":""}${sv.note?" — "+sv.note:""}`:null;}).filter(Boolean);
    const palpHTML=palpItems.length?`<div class="adoc-sub-lbl" style="margin-top:10px">Palpation — tender</div>${chips(palpItems,"tender")}`:"";

    // Neurological
    const ns=c.neuro&&c.neuro[r]||{};
    const neuroSyms=ANEURO_SYMS.filter((_,i)=>ns["s"+i]);
    const neuroExtra=[ns.radTo&&"Radiates → "+ns.radTo, ns.dermatomal&&"Nerve: "+ns.dermatomal, ns.other&&ns.other].filter(Boolean);
    const neuroHTML=(neuroSyms.length||neuroExtra.length)?
      `<div class="adoc-sub-lbl" style="margin-top:10px">Neurological</div>
       ${chips(neuroSyms,"neuro")}
       ${neuroExtra.length?`<div style="font-size:12px;color:var(--muted);margin-top:5px">${neuroExtra.join(" &nbsp;·&nbsp; ")}</div>`:""}`
      :"";

    // ROM — only filled entries. Data can live under the plain region key OR under per-side
    // keys (region::L, region::R) depending on whether a side was chosen when the value was entered.
    // Merge all of them so we don't miss anything.
    const romData=Object.assign({},c.rom&&c.rom[r],c.rom&&c.rom[r+"::L"],c.rom&&c.rom[r+"::R"]);
    const romEntries=(AROM[r]||[]).map(({mv,norm})=>{const s=romData[mv]||{};const active=s.active,passive=s.passive;if(!active&&!passive)return null;const parts=[active&&`A:${active}°`,passive&&`P:${passive}°`].filter(Boolean).join(" / ");return{mv,norm,parts};}).filter(Boolean);
    const romHTML=romEntries.length?`<div class="adoc-sub-lbl" style="margin-top:10px">Range of motion</div>
      <div class="adoc-rom-grid">${romEntries.map(e=>`<div class="adoc-rom-item"><div class="adoc-rom-mv">${e.mv}</div><div class="adoc-rom-val">${e.parts} <span class="adoc-rom-norm">/ ${e.norm}</span></div></div>`).join("")}</div>`:"";

    // MMT — only graded muscles. Same per-side-key merge as ROM.
    const mmtData=Object.assign({},c.mmt&&c.mmt[r],c.mmt&&c.mmt[r+"::L"],c.mmt&&c.mmt[r+"::R"]);
    const mmtItems=(AMMT[r]||[]).map(m=>{const g=mmtData[m];if(g==null)return null;const note=mmtData[m+"_note"];return`${m} — ${g}/5${note?" ("+note+")":""}`;}).filter(Boolean);
    const mmtHTML=mmtItems.length?`<div class="adoc-sub-lbl" style="margin-top:10px">Manual muscle testing</div>${chips(mmtItems,+mmtItems.find(x=>+x.match(/(\d)\/5/)?.[1]||5)<4?"weak":"")}`:"";

    // Special tests — only positive ones
    const testsData=Object.assign({},c.tests&&c.tests[r],c.tests&&c.tests[r+"::L"],c.tests&&c.tests[r+"::R"]);
    const posTests=(ATESTS[r]||[]).filter(t=>testsData[t]==="+").map(t=>t+" ✚");
    const negTests=(ATESTS[r]||[]).filter(t=>testsData[t]==="-").map(t=>t);
    const testsHTML=(posTests.length||negTests.length)?
      `<div class="adoc-sub-lbl" style="margin-top:10px">Special tests</div>
       ${posTests.length?chips(posTests,"pos"):""}
       ${negTests.length?`<div style="font-size:11.5px;color:var(--muted);margin-top:4px">Negative: ${negTests.join(", ")}</div>`:""}`
      :"";

    if(obsHTML||palpHTML||neuroHTML||romHTML||mmtHTML||testsHTML){
      regionBlocks+=`<div class="adoc-region-block">
        <div class="adoc-region-lbl">${r}${sideTag}</div>
        ${obsHTML}${palpHTML}${neuroHTML}${romHTML}${mmtHTML}${testsHTML}
      </div>`;
    }
  });

  // General objective
  const genObjRows=[
    frow("Posture",c.posture),
    frow("Gait",c.gait),
    frow("Swelling / deformity",c.swelling),
    frow("Neuro (general)",c.neuroNote)
  ].filter(Boolean).join("");

  // Functional
  const funcNames=(c.func||[]).map(i=>AFUNCTIONAL[i]).filter(Boolean);
  const funcHTML=(funcNames.length||c.funcOther)?
    `<div class="adoc-row"><span class="adoc-lbl">Functional limitations</span><span class="adoc-val">${chips(funcNames,"func")}${c.funcOther?`<div style="margin-top:5px;font-size:12.5px">${c.funcOther}</div>`:""}</span></div>`:"";

  // Objective section body
  const oHasContent=regionBlocks||genObjRows||funcHTML;

  // ── A: Assessment ──
  const aRows=[
    frow("Problem list",c.problem),
    frow("Clinical notes",c.assessment)
  ].filter(Boolean).join("");

  // ── P: Plan ──
  const planCards=[
    c.stg?`<div class="adoc-plan-card"><div class="adoc-plan-lbl">Short-term goals (2–4 wks)</div><div class="adoc-plan-val">${c.stg}</div></div>`:"",
    c.ltg?`<div class="adoc-plan-card"><div class="adoc-plan-lbl">Long-term goals (discharge)</div><div class="adoc-plan-val">${c.ltg}</div></div>`:"",
    c.sessions?`<div class="adoc-plan-card"><div class="adoc-plan-lbl">Total sessions</div><div class="adoc-plan-val">${c.sessions} sessions</div></div>`:"",
    c.freq?`<div class="adoc-plan-card"><div class="adoc-plan-lbl">Frequency</div><div class="adoc-plan-val">${c.freq}</div></div>`:"",
    c.advice?`<div class="adoc-plan-card" style="grid-column:1/-1"><div class="adoc-plan-lbl">General advice / precautions</div><div class="adoc-plan-val">${c.advice}</div></div>`:""
  ].filter(Boolean);

  // Modalities chips
  const modalitiesHTML=(c.modalities||[]).length?`<div class="adoc-row"><span class="adoc-lbl">Modalities</span><span class="adoc-val">${chips(c.modalities,"obs")}</span></div>`:"";

  // Exercises list
  const exHTML=(c.exercises||[]).length?`<div class="adoc-row"><span class="adoc-lbl">Clinic exercises</span><span class="adoc-val"><div class="adoc-rx-list">${(c.exercises||[]).map((e,i)=>`<div class="adoc-rx-item"><span class="adoc-rx-num" style="background:#d1fae5;color:#065f46">${i+1}</span>${e}</div>`).join("")}</div></span></div>`:"";

  // Home programme
  const homeHTML=(c.home||[]).length?`<div class="adoc-row"><span class="adoc-lbl">🏠 Home programme</span><span class="adoc-val"><div class="adoc-rx-list">${(c.home||[]).map((e,i)=>`<div class="adoc-rx-item"><span class="adoc-rx-num" style="background:#fef3c7;color:#92400e">${i+1}</span>${e}</div>`).join("")}</div>${c.homeFreq?`<div style="margin-top:6px;font-size:12px;color:var(--muted)">Frequency: <b>${c.homeFreq}</b></div>`:""}${(c.homeLinks&&c.homeLinks.length)?`<div style="margin-top:6px">${c.homeLinks.filter(l=>l.name||l.link).map(l=>`<div style="font-size:12px;margin-top:2px">📎 ${l.name||'Video'}${l.link?' — <a href="'+l.link+'" target="_blank" rel="noopener">'+l.link+'</a>':''}</div>`).join("")}</div>`:""}</span></div>`:"";

  const rxHTML=(c.rx||[]).length?`<div class="adoc-row"><span class="adoc-lbl">Prescription (Rx)</span><span class="adoc-val"><div class="adoc-rx-list">${(c.rx||[]).map((r,i)=>`<div class="adoc-rx-item"><span class="adoc-rx-num">${i+1}</span>${r}</div>`).join("")}</div></span></div>`:""

  const hasPlan=planCards.length||modalitiesHTML||exHTML||homeHTML||rxHTML;

  return `<div class="adoc-wrap">
  <button class="adoc-back" onclick="current='assessment';document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.v==='assessment'));document.getElementById('view').innerHTML=views.assessment();window.scrollTo(0,0)">← Back to Assessment list</button>

  <div class="adoc-hdr">
    <div class="adoc-hdr-top">
      <div class="adoc-patient">
        <div class="adoc-av">${ini}</div>
        <div>
          <div class="adoc-name">${p.name}</div>
          <div class="adoc-sub">${[p.age&&p.age+"yrs",p.gender,p.phone,p.occupation].filter(Boolean).join(" · ")}</div>
        </div>
      </div>
      <div class="adoc-btns">
        <button class="btn sec" onclick="assessEdit('${id}')">✏ Edit</button>
        <button class="btn sec" onclick="assessPrint('${id}')">🖨 Print</button>
        <button class="btn sec" onclick="assessSavePDF('${id}')">⬇ Save PDF</button>
        ${(c.home&&c.home.length)?`<button class="btn sec" style="background:#25D366;color:#fff" onclick="sendAssessHomeWA('${id}')">📲 Send Home Plan</button>`:""}
        <button class="btn" style="background:#16a34a" onclick="startSessionFromAssess('${id}')">▶ Start Session</button>
        ${CURROLE==='owner'?`<button class="btn danger sec" onclick="delAssess('${id}')">🗑 Delete</button>`:''}
      </div>
    </div>
    <div class="adoc-meta">
      <div class="adoc-mi"><b>Date</b>${fmtDate(c.date)}</div>
      <div class="adoc-mi"><b>Patient ID</b>${patientCode(p)}</div>
      ${p.dob?`<div class="adoc-mi"><b>DOB</b>${fmtDate(p.dob)}</div>`:''}
      <div class="adoc-mi"><b>Therapist</b>${c.therapist}</div>
      ${c.mode==='upload'?`<div class="adoc-mi"><b>Mode</b><span class="tag amber">Paper scan</span></div>`:`<div class="adoc-mi"><b>Mode</b><span class="tag teal">Digital template</span></div>`}
      ${c.assessFile?`<div class="adoc-mi"><b>Attachment</b>📎 ${c.assessFile}${c.assessFilePath?` <button class="btn ghost" style="padding:2px 8px" onclick="viewAssessScan('${c.assessFilePath.replace(/'/g,"\\'")}')">👁 Open full size</button>`:''}</div>`:""}
      ${painHTML?`<div class="adoc-mi" style="margin-left:auto">${painHTML}</div>`:""}
    </div>
    ${c.assessFilePath?`<div style="margin-top:14px"><img id="assessScanImg" data-path="${c.assessFilePath.replace(/"/g,"&quot;")}" alt="Loading scan…" style="width:40%;min-width:260px;max-width:100%;max-height:520px;object-fit:contain;border-radius:10px;border:1px solid var(--line);background:#f8fafc;display:block"></div>`:''}
  </div>

  ${sRows?`<div class="adoc-sec">
    <div class="adoc-sec-h"><div class="adoc-sec-ico adoc-ico-s">💬</div><span class="adoc-sec-title">S · Subjective</span><span class="adoc-sec-tag">Patient reported</span></div>
    <div class="adoc-body">${sRows}</div>
  </div>`:""}

  ${oHasContent?`<div class="adoc-sec">
    <div class="adoc-sec-h"><div class="adoc-sec-ico adoc-ico-o">🩺</div><span class="adoc-sec-title">O · Objective</span><span class="adoc-sec-tag">Clinical findings</span></div>
    <div class="adoc-body">
      ${genObjRows}
      ${regionBlocks?`<div style="margin-top:${genObjRows?"12px":"0"}">${regionBlocks}</div>`:""}
      ${funcHTML}
    </div>
  </div>`:""}

  ${(c.dx||aRows)?`<div class="adoc-sec">
    <div class="adoc-sec-h"><div class="adoc-sec-ico adoc-ico-a">📋</div><span class="adoc-sec-title">A · Assessment</span><span class="adoc-sec-tag">Clinical impression</span></div>
    <div class="adoc-body">
      ${c.dx?`<div class="adoc-dx-card"><div class="adoc-dx-lbl">Provisional diagnosis</div><div class="adoc-dx-val">${c.dx}</div></div>`:""}
      ${aRows}
    </div>
  </div>`:""}

  ${hasPlan?`<div class="adoc-sec">
    <div class="adoc-sec-h"><div class="adoc-sec-ico adoc-ico-p">✅</div><span class="adoc-sec-title">P · Plan</span><span class="adoc-sec-tag">Treatment & goals</span></div>
    <div class="adoc-body">
      ${planCards.length?`<div class="adoc-plan-grid">${planCards.join("")}</div>`:""}
      ${modalitiesHTML}
      ${exHTML}
      ${homeHTML}
      ${rxHTML}
      <div class="adoc-sig"><div class="adoc-sig-inner"><div class="adoc-sig-line"></div><div class="adoc-sig-name">${c.therapist}</div><div class="adoc-sig-role">Physiotherapist · ${DB.settings.clinic}</div></div></div>
    </div>
  </div>`:""}

</div>`;
}

// ── Build single-page line-by-line PDF layout ──
function buildPDFHTML(id){
  const c=DB.assessments.find(x=>x.id===id);if(!c)return'';
  const p=pById(c.pid);
  const ini=p.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const pn=c.pain!=null?+c.pain:null;
  const painCls=pn===null?'#94a3b8':(pn<=3?'#16a34a':pn<=6?'#d97706':pn<=8?'#dc2626':'#7f1d1d');

  // helpers
  const chip=(txt,bg,col)=>`<span style="display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:600;background:${bg};color:${col};margin:1px 3px 1px 0;white-space:nowrap">${txt}</span>`;
  const lrow=(lbl,val)=>val?`<tr><td style="padding:3px 8px 3px 0;font-size:9.5px;font-weight:700;color:#64748b;white-space:nowrap;vertical-align:top;width:130px;text-transform:uppercase;letter-spacing:.2px">${lbl}</td><td style="padding:3px 0;font-size:10px;color:#1e293b;line-height:1.5">${val}</td></tr>`:''  ;
  const sec=(ico,lbl,col,content)=>content?`
    <div style="margin-bottom:8px">
      <div style="background:${col};color:#fff;padding:4px 12px;font-size:9.5px;font-weight:700;letter-spacing:.6px;display:flex;align-items:center;gap:6px;border-radius:5px 5px 0 0">${ico} ${lbl}</div>
      <div style="border:1px solid ${col}33;border-top:none;border-radius:0 0 5px 5px;padding:8px 12px;background:#fafbfc">${content}</div>
    </div>`:''  ;

  // ── S · Subjective ──
  const sContent=`<table style="width:100%;border-collapse:collapse">
    ${lrow('Chief complaint',c.complaint)}
    ${lrow('Onset / mechanism',c.onset)}
    ${lrow('Pain site & radiation',c.painsite)}
    ${c.pain!=null?lrow('Pain (NPRS)',`<span style="display:inline-block;padding:1px 10px;border-radius:20px;font-size:9px;font-weight:700;background:${painCls};color:#fff">${c.pain}/10</span>`):''}
    ${lrow('Aggravating factors',c.aggr)}
    ${lrow('Relieving factors',c.reliev)}
    ${lrow('History / medications',c.history)}
  </table>`;

  // ── O · Objective ──
  // General
  const genRows=[lrow('Posture',c.posture),lrow('Gait',c.gait),lrow('Swelling / deformity',c.swelling),lrow('Neuro (general)',c.neuroNote)].filter(Boolean).join('');
  const genTable=genRows?`<table style="width:100%;border-collapse:collapse;margin-bottom:6px">${genRows}</table>`:'';

  // Per-region
  let regLines='';
  (c.regions||[]).forEach(r=>{
    const side=c.regionSides&&c.regionSides[r];
    const obsIdxs=c.obs&&c.obs[r]||[];
    const obsNames=(AOBS[r]||[]).filter((_,i)=>obsIdxs.includes(i));
    const palpData=c.palp&&c.palp[r]||{};
    const palpItems=(APALP[r]||[]).map((pt,i)=>{const sv=palpData[i]||{};return sv.tender?pt.pt+(sv.note?' ('+sv.note+')':''):null;}).filter(Boolean);
    const ns=c.neuro&&c.neuro[r]||{};
    const neuroSyms=ANEURO_SYMS.filter((_,i)=>ns['s'+i]);
    const neuroExtra=[ns.radTo&&'Radiates→'+ns.radTo,ns.dermatomal&&ns.dermatomal].filter(Boolean).join(' · ');
    const romData=Object.assign({},c.rom&&c.rom[r],c.rom&&c.rom[r+"::L"],c.rom&&c.rom[r+"::R"]);
    const romEntries=(AROM[r]||[]).map(({mv,norm})=>{const s=romData[mv]||{};if(!s.active&&!s.passive)return null;return `${mv} ${[s.active&&'A:'+s.active+'°',s.passive&&'P:'+s.passive+'°'].filter(Boolean).join('/')} <span style="color:#94a3b8">(N:${norm})</span>`;}).filter(Boolean);
    const mmtData=Object.assign({},c.mmt&&c.mmt[r],c.mmt&&c.mmt[r+"::L"],c.mmt&&c.mmt[r+"::R"]);
    const mmtItems=(AMMT[r]||[]).map(m=>{const g=mmtData[m];return g!=null?`${m} — ${g}/5`:null;}).filter(Boolean);
    const testsData=Object.assign({},c.tests&&c.tests[r],c.tests&&c.tests[r+"::L"],c.tests&&c.tests[r+"::R"]);
    const posTests=(ATESTS[r]||[]).filter(t=>testsData[t]==='+');
    const negTests=(ATESTS[r]||[]).filter(t=>testsData[t]==='-');

    let cells='';
    if(obsNames.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;width:100px;vertical-align:top">Observation</td><td style="padding:2px 0">${obsNames.map(o=>chip(o,'#dcfce7','#166534')).join('')}</td></tr>`;
    if(palpItems.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">Tender</td><td style="padding:2px 0">${palpItems.map(o=>chip(o,'#fef3c7','#92400e')).join('')}</td></tr>`;
    if(neuroSyms.length||neuroExtra) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">Neuro</td><td style="padding:2px 0">${neuroSyms.map(o=>chip(o,'#ede9fe','#6d28d9')).join('')}${neuroExtra?`<span style="font-size:9px;color:#6d28d9;margin-left:4px">${neuroExtra}</span>`:''}</td></tr>`;
    if(romEntries.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">ROM</td><td style="padding:2px 0;font-size:9px;color:#0369a1">${romEntries.join(' &nbsp;|&nbsp; ')}</td></tr>`;
    if(mmtItems.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">MMT</td><td style="padding:2px 0">${mmtItems.map(o=>chip(o,'#fff7ed','#c2410c')).join('')}</td></tr>`;
    if(posTests.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">+ve Tests</td><td style="padding:2px 0">${posTests.map(o=>chip('+'+o,'#fee2e2','#b91c1c')).join('')}</td></tr>`;
    if(negTests.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">-ve Tests</td><td style="padding:2px 0;font-size:9px;color:#94a3b8">${negTests.join(', ')}</td></tr>`;

    if(cells){
      regLines+=`<div style="margin-bottom:6px;padding:6px 8px;border:1px solid #e2e8f0;border-left:3px solid #2563eb;border-radius:4px;background:#fff">
        <div style="font-size:9.5px;font-weight:700;color:#0f172a;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">${r}${side?' <span style="font-weight:400;color:#2563eb;text-transform:none">· '+side+'</span>':''}</div>
        <table style="width:100%;border-collapse:collapse">${cells}</table>
      </div>`;
    }
  });

  // Functional limitations
  const funcNames=(c.func||[]).map(i=>AFUNCTIONAL[i]).filter(Boolean);
  const funcLine=funcNames.length||c.funcOther?`<div style="margin-top:4px"><span style="font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase;margin-right:6px">Functional limitations</span>${funcNames.map(f=>chip(f,'#fef9c3','#854d0e')).join('')}${c.funcOther?chip(c.funcOther,'#fef9c3','#854d0e'):''}</div>`:'';

  const oContent=genTable+regLines+funcLine;

  // ── A · Assessment ──
  const dxBlock=c.dx?`<div style="background:#ede9fe;border-radius:4px;padding:5px 10px;margin-bottom:6px;display:flex;align-items:baseline;gap:8px"><span style="font-size:8.5px;color:#7c3aed;font-weight:700;text-transform:uppercase;white-space:nowrap">Diagnosis</span><span style="font-size:11px;font-weight:700;color:#1e3a8a">${c.dx}</span></div>`:'';
  const aContent=dxBlock+`<table style="width:100%;border-collapse:collapse">${[lrow('Problem list',c.problem),lrow('Clinical notes',c.assessment)].filter(Boolean).join('')}</table>`;

  // ── P · Plan ──
  const goalsRow=(c.stg||c.ltg)?`<div style="display:flex;gap:8px;margin-bottom:6px">
    ${c.stg?`<div style="flex:1;border:1px solid #e2e8f0;border-radius:4px;padding:4px 7px"><div style="font-size:8px;color:#64748b;font-weight:700;text-transform:uppercase">Short-term goals</div><div style="font-size:9.5px;color:#0f172a;margin-top:2px">${c.stg}</div></div>`:''}

// ── Print: inject compact PDF page, print, remove ──
function assessPrint(id){
  const html=buildPDFHTML(id);if(!html)return;
  const div=document.createElement('div');
  div.id='print-only-sheet';
  div.style.cssText='position:fixed;inset:0;z-index:99999;background:#fff;overflow:hidden';
  div.innerHTML=html;
  document.body.appendChild(div);
  // hide everything else
  document.body.querySelectorAll(':scope > *:not(#print-only-sheet)').forEach(el=>el.style.display='none');
  window.print();
  document.body.querySelectorAll(':scope > *:not(#print-only-sheet)').forEach(el=>el.style.display='');
  div.remove();
}

// ── PDF: build the assessment report doc (does not save/persist anything) ──
function buildAssessPDF(id){
  const c=DB.assessments.find(x=>x.id===id);
  if(!c){alert('Assessment not found.');return null;}
  const p=pById(c.pid)||{};
  const jsPDFLib=(window.jspdf&&window.jspdf.jsPDF)||window.jsPDF;
  if(!jsPDFLib){alert('PDF library not loaded. Please refresh and try again.');return null;}

  const doc=new jsPDFLib({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,M=14,CW=W-2*M;let y=20;

  function chk(){if(y>270){doc.addPage();y=18;}}
  function fld(lbl,val){
    chk();
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor('#0d9488');
    doc.text(String(lbl)+':',M,y);
    const lw=doc.getTextWidth(String(lbl)+': ');
    doc.setFont('helvetica','normal');doc.setTextColor('#1a2233');
    const lines=doc.splitTextToSize(String(val||'—'),CW-lw);
    doc.text(lines,M+lw,y);y+=Math.max(lines.length*4.5,4.5)+1.5;
  }
  function sec(t){
    chk();y+=2;
    doc.setFillColor('#0d9488');doc.roundedRect(M,y-3.5,CW,7.5,1.5,1.5,'F');
    doc.setFontSize(8.5);doc.setFont('helvetica','bold');doc.setTextColor('#ffffff');
    doc.text(t,M+3,y+1);y+=8;
  }
  function textBlock(val){
    if(!val)return;chk();
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor('#1a2233');
    const lines=doc.splitTextToSize(String(val),CW);
    lines.forEach(function(ln){chk();doc.text(ln,M,y);y+=4.5;});
    y+=1;
  }

  // Header bar
  doc.setFillColor('#0b1b3d');doc.rect(0,0,W,16,'F');
  doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor('#ffffff');
  doc.text('PhysioMind Clinic OS',M,9);
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor('#aebcc7');
  doc.text('Physiotherapy Assessment Report',M,14);
  doc.setFontSize(7);doc.setTextColor('#7d93a0');
  doc.text('Generated: '+new Date().toLocaleDateString('en-IN'),W-M-30,9);
  y=22;

  sec('PATIENT INFORMATION');
  fld('Patient Name',p.name||'—');
  fld('Age / Gender',(p.age||'—')+' yrs  |  '+(p.gender==='M'?'Male':p.gender==='F'?'Female':'—'));
  fld('Phone',p.phone||'—');
  fld('Assessment Date',c.date||'—');
  fld('Therapist',c.therapist||'—');

  sec('CHIEF COMPLAINT & HISTORY');
  fld('Chief Complaint',c.complaint||'—');
  fld('Onset',c.onset||'—');
  fld('Pain Site',c.painsite||'—');
  fld('VAS Pain Score',c.pain!=null?String(c.pain)+'/10':'—');
  fld('Aggravating Factors',c.aggr||'—');
  fld('Relieving Factors',c.reliev||'—');
  fld('Past History',c.history||'—');
  if(c.medications)fld('Medications',c.medications);

  sec('OBJECTIVE FINDINGS');
  fld('Posture',c.posture||'—');
  fld('Gait',c.gait||'—');
  fld('Swelling/Oedema',c.swelling||'—');
  if(c.neuroNote)fld('Neurological (general)',c.neuroNote);

  // Per-region digital-template findings: Observation, Palpation/Tenderness,
  // Neuro symptoms, ROM, MMT/Strength, +ve/-ve Special Tests
  if(c.regions&&c.regions.length){
    c.regions.forEach(function(r){
      const side=c.regionSides&&c.regionSides[r];
      const obsIdxs=(c.obs&&c.obs[r])||[];
      const obsNames=(AOBS[r]||[]).filter(function(_,i){return obsIdxs.includes(i);});

      const palpData=(c.palp&&c.palp[r])||{};
      const palpItems=(APALP[r]||[]).map(function(pt,i){
        const sv=palpData[i]||{};
        if(!sv.tender)return null;
        return pt.pt+(sv.side?' ('+sv.side+')':'')+(sv.note?' — '+sv.note:'');
      }).filter(Boolean);

      const ns=(c.neuro&&c.neuro[r])||{};
      const neuroSyms=ANEURO_SYMS.filter(function(_,i){return ns['s'+i];});
      const neuroExtra=[ns.radTo?'Radiates → '+ns.radTo:null,ns.dermatomal||null].filter(Boolean);
      const neuroAll=neuroSyms.concat(neuroExtra);

      const romData=Object.assign({},c.rom&&c.rom[r],c.rom&&c.rom[r+"::L"],c.rom&&c.rom[r+"::R"]);
      const romEntries=(AROM[r]||[]).map(function(o){
        const s=romData[o.mv]||{};
        if(!s.active&&!s.passive)return null;
        const parts=[s.active?'A:'+s.active+'°':null,s.passive?'P:'+s.passive+'°':null].filter(Boolean);
        return o.mv+' '+parts.join('/')+' (N:'+o.norm+')';
      }).filter(Boolean);

      const mmtData=Object.assign({},c.mmt&&c.mmt[r],c.mmt&&c.mmt[r+"::L"],c.mmt&&c.mmt[r+"::R"]);
      const mmtItems=(AMMT[r]||[]).map(function(m){
        const g=mmtData[m];
        return g!=null?m+' — '+g+'/5'+(mmtData[m+'_note']?' ('+mmtData[m+'_note']+')':''):null;
      }).filter(Boolean);

      const testsData=Object.assign({},c.tests&&c.tests[r],c.tests&&c.tests[r+"::L"],c.tests&&c.tests[r+"::R"]);
      const posTests=(ATESTS[r]||[]).filter(function(t){return testsData[t]==='+';});
      const negTests=(ATESTS[r]||[]).filter(function(t){return testsData[t]==='-';});

      if(!obsNames.length&&!palpItems.length&&!neuroAll.length&&!romEntries.length&&!mmtItems.length&&!posTests.length&&!negTests.length)return;

      chk();y+=1.5;
      doc.setFontSize(9.5);doc.setFont('helvetica','bold');doc.setTextColor('#2563eb');
      doc.text(r+(side?'  ·  '+side:''),M,y);y+=4.8;

      if(obsNames.length)fld('Observation',obsNames.join(', '));
      if(palpItems.length)fld('Tenderness / Palpation',palpItems.join('; '));
      if(neuroAll.length)fld('Neuro symptoms',neuroAll.join('; '));
      if(romEntries.length)fld('ROM',romEntries.join('  |  '));
      if(mmtItems.length)fld('MMT / Strength',mmtItems.join('; '));
      if(posTests.length)fld('+ve Special Tests',posTests.join(', '));
      if(negTests.length)fld('-ve Special Tests',negTests.join(', '));
      y+=1;
    });

    const funcNames=(c.func||[]).map(function(i){return AFUNCTIONAL[i];}).filter(Boolean);
    if(funcNames.length||c.funcOther)fld('Functional Limitations',funcNames.concat(c.funcOther?[c.funcOther]:[]).join(', '));
  } else {
    // Legacy / non-digital assessments: flat ROM + Special Tests fields
    if(c.rom&&Object.keys(c.rom).length){
      const romLines=[];
      Object.keys(c.rom).forEach(function(region){
        const rv=c.rom[region];
        Object.keys(rv).forEach(function(mv){
          const m=rv[mv];
          if(m&&(m.active||m.passive)){
            romLines.push(region+' '+mv+': A='+m.active+'°  P='+(m.passive||'—')+'°');
          }
        });
      });
      if(romLines.length){
        chk();doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor('#0d9488');
        doc.text('Range of Motion:',M,y);y+=4.5;
        romLines.forEach(function(ln){
          chk();doc.setFont('helvetica','normal');doc.setTextColor('#1a2233');
          doc.setFontSize(8);doc.text('  '+ln,M,y);y+=4.2;
        });y+=1;
      }
    }
    if(c.tests&&Object.keys(c.tests).length){
      const tlines=[];
      Object.keys(c.tests).forEach(function(region){
        const rt=c.tests[region];
        Object.keys(rt).forEach(function(tn){tlines.push(tn+': '+rt[tn]);});
      });
      if(tlines.length)fld('Special Tests',tlines.join('  |  '));
    }
    if(c.special)fld('Special tests',c.special);
    if(c.palp)fld('Palpation / tenderness',c.palp);
    if(c.strength)fld('Strength',c.strength);
  }

  sec('CLINICAL FINDINGS & DIAGNOSIS');
  fld('Clinical Assessment',c.assessment||'—');
  fld('Diagnosis (Dx)',c.dx||'—');
  fld('Problem Statement',c.problem||'—');

  sec('TREATMENT PLAN');
  fld('Short-Term Goals',c.stg||'—');
  fld('Long-Term Goals',c.ltg||'—');
  fld('Sessions / Frequency',String(c.sessions||'—')+' sessions  |  '+(c.freq||'—'));
  if(c.modalities&&c.modalities.length)fld('Modalities',c.modalities.join(', '));
  if(c.exercises&&c.exercises.length)fld('Exercises',c.exercises.join('; '));
  if(c.home&&c.home.length)fld('Home Programme',c.home.join('; '));
  fld('Advice',c.advice||'—');

  if(c.rx&&c.rx.length){
    sec('PRESCRIPTION (Rx)');
    c.rx.forEach(function(r,i){
      chk();doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor('#1a2233');
      doc.text((i+1)+'. '+r,M+2,y);y+=5;
    });
  }

  // Footer
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFillColor('#f4f6fb');doc.rect(0,287,W,10,'F');
    doc.setFontSize(7);doc.setFont('helvetica','italic');doc.setTextColor('#6b7589');
    doc.text('PhysioMind Clinic OS  |  Confidential — For clinical use only',M,293);
    doc.text('Page '+i+' of '+pages,W-M-12,293);
  }

  const fname='Assessment_'+(p.name||'Patient').replace(/\s+/g,'_')+'_'+(c.date||todayISO)+'.pdf';
  return {doc,fname,pid:c.pid};
}

// Save: upload the actual PDF file to Supabase Storage (works from any device),
// keep a local IndexedDB copy too for instant offline access, then download to the device.
function delAssess(id){
  if(CURROLE!=='owner'){alert("Only the owner can delete assessments.");return;}
  const c=(DB.assessments||[]).find(x=>x.id===id);if(!c)return;
  const p=pById(c.pid);const pname=p?p.name:'this patient';
  if(!confirm("Delete this assessment for "+pname+"?\n\nThis cannot be undone. Any linked PDF and scan photos will also be removed."))return;
  if(!confirm("Are you absolutely sure? Tap OK to confirm permanent deletion."))return;
  // Remove from patient's docs list too
  if(p&&p.docs){p.docs=p.docs.filter(d=>d.assessId!==id);}
  DB.assessments=(DB.assessments||[]).filter(x=>x.id!==id);
  logAudit("Assessment","Deleted assessment",pname);
  save();
  current="assessment";
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.v==="assessment"));
  render();
  toast("✓ Assessment deleted");
}
async function assessSavePDF(id){
  const built=buildAssessPDF(id);if(!built)return;
  const {doc,fname,pid}=built;
  const p=pById(pid);
  const c=DB.assessments.find(x=>x.id===id);
  const blob=doc.output('blob');
  let storagePath="";
  if(sb){
    toast("Uploading PDF…",8000);
    const path="assessments/"+id+".pdf";
    const {error}=await sb.storage.from("assessment-pdfs").upload(path,blob,{upsert:true,contentType:"application/pdf"});
    if(!error)storagePath=path;else console.error("Assessment PDF upload failed:",error.message);
  }
  if(p&&p.id){
    if(!p.docs)p.docs=[];
    const existIdx=p.docs.findIndex(d=>d.assessId===id);
    const docEntry={n:fname,d:(c&&c.date)||todayISO,assessId:id,path:storagePath,type:'assessment-pdf'};
    if(existIdx>-1)p.docs[existIdx]=docEntry;else p.docs.push(docEntry);
    save();
  }
  idbSavePDF(id,blob,fname);
  doc.save(fname);
  if(typeof logAudit==='function')logAudit('Assessment PDF','Saved & downloaded for '+(p&&p.name||'patient'),(p&&p.name)||'');
}
// View/Download — tries the real Storage file first (works from any device), then
// falls back to this device's local IndexedDB cache, then regenerates from data as a last resort.
async function viewAssessDoc(assessId){
  const w=window.open('','_blank'); // open synchronously first, so popup blockers allow it
  if(sb){
    const {data}=await sb.storage.from('assessment-pdfs').createSignedUrl("assessments/"+assessId+".pdf",3600);
    if(data&&data.signedUrl){if(w)w.location=data.signedUrl;return;}
  }
  const rec=await idbGetPDF(assessId);
  if(rec&&rec.blob){if(w)w.location=URL.createObjectURL(rec.blob);return;}
  if(w)w.close();
  const built=buildAssessPDF(assessId);if(!built)return;
  built.doc.output('dataurlnewwindow');
}
async function dlAssessDoc(assessId){
  if(sb){
    const {data}=await sb.storage.from('assessment-pdfs').createSignedUrl("assessments/"+assessId+".pdf",3600,{download:true});
    if(data&&data.signedUrl){const a=document.createElement('a');a.href=data.signedUrl;a.click();return;}
  }
  const rec=await idbGetPDF(assessId);
  if(rec&&rec.blob){const url=URL.createObjectURL(rec.blob);const a=document.createElement('a');a.href=url;a.download=rec.fname||'Assessment.pdf';a.click();setTimeout(()=>URL.revokeObjectURL(url),4000);return;}
  const built=buildAssessPDF(assessId);if(!built)return;
  built.doc.save(built.fname);
}


// ── Start Session from assessment → creates/reuses treatment plan, opens log form ──
function startSessionFromAssess(id){
  const c=DB.assessments.find(x=>x.id===id);if(!c)return;
  // Check if a treatment plan already exists for this patient with same diagnosis
  let plan=DB.plans.find(t=>t.pid===c.pid&&t.diagnosis===c.dx&&t.done<t.sessions);
  if(plan&&c.homeLinks&&c.homeLinks.length&&(!plan.homeLinks||!plan.homeLinks.length)){
    plan.homeLinks=c.homeLinks;save();
  }
  if(!plan){
    // Create a new plan seeded from the assessment
    plan={
      id:uid("t"),
      pid:c.pid,
      diagnosis:c.dx||c.complaint||'Physiotherapy',
      goal:c.stg||c.ltg||'As per assessment',
      sessions:c.sessions||12,
      done:0,
      modalities:c.modalities||[],
      exercises:c.exercises||[],
      home:c.home||[],
      homeFreq:c.homeFreq||'',
      homeLinks:c.homeLinks||[],
      notes:c.advice||'',
      visits:[]
    };
    if(!DB.plans)DB.plans=[];
    DB.plans.push(plan);
    save();
  }
  // Navigate to Treatment tab and open session log
  go('treatment');
  setTimeout(()=>sessionForm(plan.id),80);
}

// ── Document helpers (patient profile docs tab) ──
async function viewDoc(pid,idx){
  const p=pById(pid);if(!p||!p.docs)return;
  const d=p.docs[idx];if(!d)return;
  if(d.type==='assessment-pdf'&&d.assessId){viewAssessDoc(d.assessId);return;}
  if(d.path){
    const w=window.open('','_blank'); // open synchronously first, so popup blockers allow it
    if(!sb){alert("Supabase isn't connected.");if(w)w.close();return;}
    const {data,error}=await sb.storage.from('patient-documents').createSignedUrl(d.path,3600);
    if(error||!data){if(w)w.close();alert("Couldn't load file: "+(error&&error.message||'unknown error'));return;}
    if(w)w.location=data.signedUrl;
    return;
  }
  if(!d.data)return;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${d.n}</title><style>body,html{margin:0;padding:0;height:100%}iframe{border:none;width:100%;height:100vh}</style></head><body><iframe src="${d.data}"></iframe></body></html>`);
  w.document.close();

async function dlDoc(pid,idx){
  const p=pById(pid);if(!p||!p.docs)return;
  const d=p.docs[idx];if(!d)return;
  if(d.type==='assessment-pdf'&&d.assessId){dlAssessDoc(d.assessId);return;}
  if(d.path){
    if(!sb){alert("Supabase isn't connected.");return;}
    const {data,error}=await sb.storage.from('patient-documents').createSignedUrl(d.path,3600,{download:d.n});
    if(error||!data){alert("Couldn't download file: "+(error&&error.message||'unknown error'));return;}
    const a=document.createElement('a');a.href=data.signedUrl;a.download=d.n;a.click();
    return;
  }
  if(!d.data)return;
  const a=document.createElement('a');a.href=d.data;a.download=d.n;a.click();
}

let _assessPage=0,_assessQ="",_assessTher="";

function renderAssessTable(){
  const all=(DB.assessments||[]).filter(c=>{const p=pById(c.pid);return p&&inBranch(p);}).filter(c=>!MYTHER||c.therapist===MYTHER).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const filtered=all.filter(c=>{const p=pById(c.pid);if(!p)return false;const txt=((p.name||"")+" "+(c.dx||"")+" "+(c.therapist||"")).toLowerCase();return (!_assessQ||txt.includes(_assessQ))&&(!_assessTher||c.therapist===_assessTher);});
  const pg2=filtered.slice(_assessPage*PG,(_assessPage+1)*PG);
  const rows=pg2.map(c=>{const p=pById(c.pid);return `<tr class="clk" onclick="assessView('${c.id}')"><td>${fmtDate(c.date)}</td><td><div class="pcell"><div class="avatar">${initials(p.name)}</div><div class="nm">${p.name}</div></div></td><td>${c.dx||'—'}</td><td>${c.therapist}</td><td style="text-align:right"><button class="btn sm sec" onclick="event.stopPropagation();printRx('${c.id}','assessment')">🖨 Rx</button></td></tr>`;}).join("")||'<tr><td colspan=5 class=empty>No assessments found</td></tr>';
  const tbody=document.getElementById("assessTbody");
  if(tbody){tbody.innerHTML=rows;const pgEl=document.getElementById("assessPgBar");if(pgEl)pgEl.innerHTML=pgBar(filtered.length,_assessPage,'setAssessPage');}
}

   +'<button onclick="if(!confirm(\'Clear audit log?\'))return;DB.auditLog=[];save();render();" style="padding:8px 14px;background:var(--danger);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px">Clear Log</button>'
   +'</div><div id="audit_list" style="'+(q?'':'padding:0 17px 10px')+'">'+body+'</div></div></div>';
};
function renderAuditList(l){
  if(!l||!l.length)return'<div style="text-align:center;color:var(--muted);padding:40px 20px">No audit events yet. Actions like adding patients, invoices, and sessions will appear here.</div>';
  return l.map(function(e){
    var d=new Date(e.ts);
    var dt=d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
    var a=(e.action||"Action");
    var col="#6b7280";
    if(a.indexOf("Patient")>=0||a.indexOf("Add")>=0)col="#0d9488";
    else if(a.indexOf("Appoint")>=0)col="#2563eb";
    else if(a.indexOf("Invoice")>=0||a.indexOf("Pay")>=0)col="#7c3aed";
    else if(a.indexOf("Edit")>=0||a.indexOf("Update")>=0)col="#d97706";
    else if(a.indexOf("Delete")>=0||a.indexOf("Remove")>=0)col="#dc2626";
    var h='<div class="list-row" style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)">'
      +'<div style="width:10px;height:10px;border-radius:50%;background:'+col+';margin-top:4px;flex-shrink:0"></div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px">'
      +'<b style="font-size:13px">'+a+'</b>'
      +'<span style="font-size:11px;color:var(--muted);white-space:nowrap">'+dt+'</span></div>';
    if(e.detail)h+='<div style="font-size:13px;margin-top:2px;color:var(--ink)">'+e.detail+'</div>';
    h+='<div style="font-size:11px;color:var(--muted);margin-top:3px">';
    if(e.patient)h+='Patient: <b>'+e.patient+'</b> &bull; ';
    h+='User: '+(e.user||"—")+'</div></div></div>';
    return h;
  }).join("");
}

// Backup enforcement of desktop vs mobile layout. The CSS media queries above are the source
// of truth; this just clears any stale inline style (e.g. left over from a manual style tweak)
// so it can never disagree with them. Uses matchMedia — the same breakpoint engine the CSS
// itself uses — instead of polling window.innerWidth on a timer.
function applyLayoutMode(){
  const bn=document.getElementById("bottomNav");
  const app=document.querySelector(".app");
  const md=document.getElementById("moreDrawer");
  if(bn)bn.style.removeProperty("display");
  if(app)app.style.removeProperty("padding-bottom");
  if(window.matchMedia("(min-width:641px)").matches&&md)md.classList.remove("open");
}
const _desktopMQ=window.matchMedia("(min-width:641px)");
(_desktopMQ.addEventListener?_desktopMQ.addEventListener.bind(_desktopMQ):_desktopMQ.addListener.bind(_desktopMQ))("change",applyLayoutMode);
window.addEventListener("resize",applyLayoutMode);
// The bottom-nav element is defined further down in the HTML, after this script tag —
// calling applyLayoutMode() immediately here would run before that element exists at all,
// silently doing nothing. Wait until the full page has loaded instead.
if(document.readyState==="complete"||document.readyState==="interactive"){setTimeout(applyLayoutMode,0);}
else{document.addEventListener("DOMContentLoaded",applyLayoutMode);}
window.addEventListener("load",applyLayoutMode);
