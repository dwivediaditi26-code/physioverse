<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhysioMind — Clinic OS</title>
<style>
:root{color-scheme:light;
  --bg:#f4f6fb; --card:#fff; --ink:#1a2233; --muted:#6b7589;
  --brand:#2563eb; --brand-dark:#1d4ed8; --brand-soft:#dbeafe;
  --teal:#0d9488; --accent:#2563eb; --warn:#d97706; --danger:#dc2626; --ok:#16a34a;
  --line:#e6e9f0; --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04); --sidebar:#0b1b3d; --bg2:#f4f6fb; --text:#1a2233; --tx:#1a2233;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink);background:#fff}
.app{display:flex;min-height:100vh}
.sidebar{width:236px;background:#0b1b3d;color:#cdd7df;display:flex;flex-direction:column;position:fixed;height:100vh;height:100dvh;left:0;top:0}
.brand{padding:18px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:grid;place-items:center;font-weight:800;color:#fff;font-size:16px}
.brand h1{font-size:16px;color:#fff;line-height:1.1}
.brand small{color:#7d93a0;font-size:10px;font-weight:700;letter-spacing:1px}
.nav{padding:8px 10px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.nav .grp{font-size:10px;letter-spacing:1px;color:#5d7286;font-weight:700;padding:12px 14px 5px}
.nav button{width:100%;text-align:left;background:none;border:none;color:#aebcc7;padding:9px 14px;border-radius:8px;display:flex;align-items:center;gap:11px;font-size:13.5px;margin-bottom:1px}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.active{background:var(--brand);color:#fff;font-weight:600}
.nav .ico{width:19px;text-align:center;font-size:15px}
.side-foot{padding:12px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#7d93a0}
.side-foot b{color:#cdd7df}
.main{margin-left:236px;flex:1;min-width:0}
.apphead{position:sticky;top:0;z-index:20}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:13px 26px;display:flex;align-items:center;justify-content:space-between}
.activebar{background:var(--card);border-bottom:1px solid var(--line);display:none}
.abar-inner{padding:8px 26px;display:flex;align-items:center;gap:13px}
.abar-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;white-space:nowrap}
.abar-chips{display:flex;gap:8px;overflow-x:auto}
.achip{display:flex;align-items:center;gap:7px;background:#f4f6fb;border:1px solid var(--line);border-radius:9px;padding:6px 10px;font-size:13px;cursor:pointer;white-space:nowrap}
.achip:hover{border-color:var(--brand);background:var(--brand-soft)}
.achip-av{width:22px;height:22px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:700}
.achip-x{color:var(--muted);font-size:12px;margin-left:1px;font-weight:700}
.achip-x:hover{color:var(--danger)}
.topbar h2{font-size:19px}
.topbar .sub{color:var(--muted);font-size:13px;margin-top:1px}
.topbar .right{display:flex;align-items:center;gap:13px}
.clinic-chip{display:flex;align-items:center;gap:8px;background:var(--brand-soft);color:var(--brand-dark);padding:6px 12px;border-radius:30px;font-weight:600;font-size:13px;border:none}
.content{padding:24px}
.btn{background:var(--brand);color:#fff;border:none;padding:9px 15px;border-radius:8px;font-weight:600;font-size:13.5px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--brand-dark)}
.btn.sec{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.sec:hover{background:#f7f9fc}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.teal{background:var(--teal)}
.btn.danger{background:var(--danger)}
.btn.ghost{background:none;color:var(--muted);border:none;padding:5px}
.btn.ghost:hover{color:var(--ink)}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:17px;box-shadow:var(--shadow)}
.stat .lbl{color:var(--muted);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}
.stat .val{font-size:26px;font-weight:800;margin-top:7px}
.stat .delta{font-size:12px;margin-top:4px;color:var(--ok);font-weight:600}
.stat .ico{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:16px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
.panel-h{padding:14px 17px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.panel-h h3{font-size:15px}
.panel-h .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.panel-b{padding:17px}
.panel-b.flush{padding:0}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:10px 17px;border-bottom:1px solid var(--line);background:#fafbfd}
td{padding:12px 17px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clk:hover{background:#f7fafc;cursor:pointer}
.tag{display:inline-block;padding:3px 9px;border-radius:30px;font-size:11.5px;font-weight:600}
.tag.green{background:#dcfce7;color:#15803d}.tag.blue{background:#dbeafe;color:#1d4ed8}
.tag.amber{background:#fef3c7;color:#b45309}.tag.red{background:#fee2e2;color:#b91c1c}
.tag.gray{background:#eef1f5;color:#5b6677}.tag.teal{background:#ccfbf1;color:#0f766e}
.tag.purple{background:#ede9fe;color:#6d28d9}
.avatar{width:33px;height:33px;border-radius:50%;background:var(--brand);color:#fff;display:inline-grid;place-items:center;font-weight:700;font-size:12.5px;flex-shrink:0}
.avatar.t{background:var(--teal)}
.pcell{display:flex;align-items:center;gap:10px}
.pcell .nm{font-weight:600}.pcell .mt{color:var(--muted);font-size:12px}
.search{display:flex;align-items:center;gap:8px;background:#f4f6fb;border:1px solid var(--line);border-radius:8px;padding:7px 11px;width:240px}
.search input{border:none;background:none;outline:none;width:100%}
.field{margin-bottom:13px}
.field label{display:block;font-weight:600;font-size:12.5px;margin-bottom:5px;color:#3a4456}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:1100;overflow:auto}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:15px;width:100%;max-width:540px;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column;max-height:90vh}
.modal.wide{max-width:740px}
.modal-h{padding:16px 21px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-h h3{font-size:16px}
.modal-b{padding:21px;overflow-y:auto;flex:1 1 auto;-webkit-overflow-scrolling:touch}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-f{padding:15px 21px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px;flex-shrink:0}
.x{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
.two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
.empty{text-align:center;padding:38px;color:var(--muted)}
.muted{color:var(--muted)}
.list-row{padding:12px 0;border-bottom:1px solid var(--line)}
.list-row:last-child{border:none}
.inv{background:#fff;border:1px solid var(--line);border-radius:10px;padding:24px;font-size:13px}
.inv-h{display:flex;justify-content:space-between;border-bottom:2px solid var(--brand);padding-bottom:13px;margin-bottom:13px;flex-wrap:wrap;gap:8px}
.inv-h > div{min-width:0}
.inv-h h2{color:var(--brand-dark)}
.inv table{margin:13px 0}.inv th,.inv td{padding:7px 9px;font-size:12.5px}
.inv .tot{text-align:right}
.inv .tot div{display:flex;justify-content:space-between;padding:3px 0;width:270px;margin-left:auto}
.inv .tot .grand{font-weight:800;font-size:15px;border-top:2px solid var(--line);padding-top:7px;margin-top:3px}
.reminder{display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--line)}
.reminder:last-child{border:none}
.r-ico{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:17px;flex-shrink:0}
.wa{background:#dcfce7;color:#15803d}.sms{background:#dbeafe;color:#1d4ed8}
.r-body{flex:1}.r-msg{background:#f4f6fb;border-radius:8px;padding:9px 11px;margin-top:5px;font-size:12.5px;color:#3a4456;white-space:pre-line}
.toggle{position:relative;width:40px;height:23px;flex-shrink:0}
.toggle input{display:none}
.toggle .tk{position:absolute;inset:0;background:#cbd5e1;border-radius:30px;transition:.2s}
.toggle .tk:before{content:"";position:absolute;width:17px;height:17px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s}
.toggle input:checked + .tk{background:var(--brand)}
.toggle input:checked + .tk:before{transform:translateX(17px)}
.pill-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.cal-day{font-weight:700;font-size:13px;color:var(--brand-dark);padding:9px 17px;background:#fafbfd;border-bottom:1px solid var(--line)}
hr.sep{border:none;border-top:1px solid var(--line);margin:15px 0}
.bar{background:#eef1f5;height:9px;border-radius:6px;overflow:hidden;margin:5px 0}
.bar > div{height:100%;background:var(--brand)}
.tabs{display:flex;gap:5px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
.tabs button{background:none;border:none;padding:9px 14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;font-size:13.5px}
.tabs button.active{color:var(--brand);border-bottom-color:var(--brand)}
.timeline{position:relative;padding-left:22px}
.timeline:before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:0 0 16px 0}
.tl-item:before{content:"";position:absolute;left:-20px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--brand);border:2px solid #fff;box-shadow:0 0 0 2px var(--brand-soft)}
.tl-item .dt{font-size:11.5px;color:var(--muted);font-weight:600}
.mini-bars{display:flex;align-items:flex-end;gap:9px;height:140px;padding-top:10px}
.mini-bars .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.mini-bars .col .b{width:100%;max-width:38px;background:linear-gradient(180deg,#3b82f6,#1d4ed8);border-radius:5px 5px 0 0}
.mini-bars .col small{font-size:11px;color:var(--muted)}
.kpi-mini{display:flex;gap:18px;flex-wrap:wrap}
.kpi-mini div b{display:block;font-size:19px}.kpi-mini div span{color:var(--muted);font-size:12px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px}
.tmpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.soap-h{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.3px;padding:3px 11px;border-radius:12px;margin:8px 0 9px}
.soap-h.s{background:#dbeafe;color:#1d4ed8}.soap-h.o{background:#ccfbf1;color:#0f766e}.soap-h.a{background:#ede9fe;color:#6d28d9}.soap-h.p{background:#fef3c7;color:#b45309}
@media(max-width:1000px){.cards{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
.hamburger{display:none;background:none;border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:18px;line-height:1;color:var(--ink)}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55}
.backdrop.show{display:block}
@media(max-width:780px){
 /* Prevent iOS Safari auto-zoom on focus — overrides any inline 12/13/14px input styles too */
 input,select,textarea{font-size:16px!important}
 .sidebar{transform:translateX(-100%);transition:transform .25s ease;z-index:60;box-shadow:0 0 40px rgba(0,0,0,.45)}
 .sidebar.open{transform:translateX(0)}
 .main{margin-left:0}
 .hamburger{display:inline-flex}
 .topbar{padding:8px 12px;min-height:52px}
 .topbar h2{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42vw}
 .topbar .sub{display:none}
 .topbar .right{gap:5px;flex-shrink:0}
 .topbar .right .btn.sm{padding:6px 9px;font-size:12px;min-height:34px}
 #branchSel{display:none}
 .userchip{gap:0}
 .uc-text{display:none}
 .content{padding:10px}
 /* Cards — single column on mobile */
 .cards{grid-template-columns:1fr 1fr!important;gap:9px}
 .stat{padding:12px}
 .stat .val{font-size:20px}
 .stat .lbl{font-size:11px}
 /* All 2/3 col grids collapse to 1 */
 .grid2,.grid3,.two-col{grid-template-columns:1fr!important}
 /* Tables — scrollable */
 .panel-b.flush{overflow-x:auto;-webkit-overflow-scrolling:touch}
 .panel-b.flush table{min-width:600px}
 /* Hide less important table columns on mobile */
 th:nth-child(3),td:nth-child(3){display:none}
 /* Panel headers wrap nicely */
 .panel-h{padding:11px 13px;gap:7px}
 .panel-h h3{font-size:14px}
 .panel-h .tools{gap:5px}
 .panel-b{padding:12px}
 /* Modals full screen */
 .modal,.modal.wide{max-width:100%;border-radius:12px 12px 0 0;position:fixed;bottom:0;left:0;right:0;margin:0;max-height:92vh;display:flex;flex-direction:column}
 .overlay{padding:0;align-items:flex-end}
 .modal-b{padding:14px;overflow-y:auto;flex:1 1 auto}
 .modal-f{padding:12px 14px;flex-shrink:0}
 /* Buttons smaller */
 .btn{padding:8px 12px;font-size:13px}
 .btn.sm{padding:5px 9px;font-size:11.5px}
 /* Branch selector */
 #branchSel{max-width:38vw;font-size:12px}
 /* Reminder templates — single col */
 .panel-b [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
 /* Treatment cards */
 .pill-row{gap:5px}
 .tag{font-size:11px;padding:2px 7px}
 /* Patient cells */
 .pcell .nm{font-size:13px}
 /* Active bar chips scroll */
 .abar-inner{flex-wrap:wrap;padding:8px 12px;gap:8px}
 .abar-chips{flex:1 1 100%;order:3;gap:6px}
 .abar-title{flex:1 1 auto}
 .abar-inner .btn.sec.sm{margin-left:0!important;order:2}
 .achip{padding:5px 8px;font-size:12px}
 /* Search bar full width */
 .search{width:100%}
 /* KPI mini wrap */
 .kpi-mini{gap:12px}
 .kpi-mini div b{font-size:16px}
 /* Tabs scroll */
 .tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:1px}
 .tabs button{white-space:nowrap;padding:8px 11px;font-size:13px}
 /* Template grid single col */
 .tmpl-grid{grid-template-columns:1fr!important}
 /* Stats single col on very small screens */
 @media(max-width:400px){.cards{grid-template-columns:1fr!important}}
}
@media(max-width:520px){
 .cards{grid-template-columns:1fr!important}
 .topbar h2{font-size:14px;max-width:38vw}
 .topbar .right .btn.sm{padding:5px 8px;font-size:11px}
 .avatar{width:28px;height:28px;font-size:11px}
}
@media print{
  body > *:not(#print-only-sheet){display:none!important}
  #print-only-sheet{position:fixed!important;inset:0!important;display:block!important;z-index:99999!important}
  @page{margin:0;size:A4 portrait}
}

/* ── Assessment module ── */
.asmt-wrap{max-width:860px;margin:0 auto;padding-bottom:40px}
.asmt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.asmt-header h3{font-size:16px;font-weight:700}
.save-pill{font-size:12px;padding:4px 11px;border-radius:20px;background:#f3f4f6;color:var(--muted);border:1px solid var(--line);transition:.2s}
.save-pill.saving{background:#fef3c7;color:#b45309;border-color:#fde68a}
.save-pill.saved{background:#dcfce7;color:#15803d;border-color:#bbf7d0}
.asec{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
.asec-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:#f8fafc;cursor:pointer;user-select:none;border:none;width:100%;text-align:left}
.asec-head:hover{background:#f1f5f9}
.asec-head h4{font-size:13.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
.asec-head .snum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--brand);color:#fff;border-radius:50%;font-size:11px;font-weight:700;flex-shrink:0}
.asec-chev{font-size:11px;color:var(--muted);transition:transform .18s}
.asec.open .asec-chev{transform:rotate(180deg)}
.asec-body{padding:16px;display:none}
.asec.open .asec-body{display:block}
.afield{margin-bottom:12px}
.afield:last-child{margin-bottom:0}
.afield label{display:block;font-size:11.5px;font-weight:700;color:#5a6680;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.afield input,.afield select,.afield textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;outline:none;font-size:13.5px;font-family:inherit}
.afield input:focus,.afield select:focus,.afield textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.afield textarea{resize:vertical;min-height:60px}
.afield input[readonly]{background:#f8fafc;color:var(--muted)}
.agrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.agrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.agrid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pain-row-a{display:flex;align-items:center;gap:0}
.pain-row-a button{width:36px;height:36px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:600;color:var(--muted);border-right:none}
.pain-row-a button:first-child{border-radius:8px 0 0 8px}
.pain-row-a button:last-child{border-right:1px solid var(--line);border-radius:0 8px 8px 0}
.pain-row-a button.psel{background:var(--brand);color:#fff;border-color:var(--brand)}
.pain-row-a button.psel-0{background:#15803d;color:#fff;border-color:#15803d}
.pain-row-a button.psel-1,.pain-row-a button.psel-2,.pain-row-a button.psel-3{background:#16a34a;color:#fff;border-color:#16a34a}
.pain-row-a button.psel-4,.pain-row-a button.psel-5,.pain-row-a button.psel-6{background:#d97706;color:#fff;border-color:#d97706}
.pain-row-a button.psel-7,.pain-row-a button.psel-8,.pain-row-a button.psel-9{background:#dc2626;color:#fff;border-color:#dc2626}
.pain-row-a button.psel-10{background:#7f1d1d;color:#fff;border-color:#7f1d1d}
.rchips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.rchip-wrap-a{display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.rchip-a{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--line);border-radius:20px;background:#fff;font-size:13px;font-weight:500;cursor:pointer;user-select:none}
.rchip-a:hover{border-color:var(--brand);color:var(--brand)}
.rchip-a.ractive{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-dark);font-weight:700}
.rsides-a{display:flex;gap:3px;padding-left:4px}
.rside-a{width:34px;height:24px;border:1px solid var(--line);background:#fff;border-radius:5px;font-size:11.5px;font-weight:700;color:var(--muted);cursor:pointer}
.rside-a:hover{border-color:var(--brand);color:var(--brand)}

async function sbLoadData(){
 const {data,error}=await sb.from('clinic_data').select('data').eq('id','main').maybeSingle();
 if(error){alert("Could not load your data from Supabase:\n\n"+error.message+"\n\nCheck your internet connection, then refresh the page.");DB=JSON.parse(JSON.stringify(seed));return;}
 if(data&&data.data){
  DB=data.data;
  if(!DB.msgTemplates||!DB.msgTemplates.length)DB.msgTemplates=JSON.parse(JSON.stringify(seed.msgTemplates));
  else{const haveIds=new Set(DB.msgTemplates.map(t=>t.id));seed.msgTemplates.forEach(t=>{if(!haveIds.has(t.id))DB.msgTemplates.push(JSON.parse(JSON.stringify(t)));});}
  if(!DB.attendance)DB.attendance=[];
  if(!DB.exerciseLinks)DB.exerciseLinks=[];
  (DB.patientPkgs||[]).forEach(k=>{if(k.status==="Active"&&k.expires&&k.expires<todayISO)k.status="Expired";});
  if(DB.plans&&seed.plans){DB.plans.forEach(function(p){var sp=seed.plans.find(function(x){return x.id===p.id;});if(sp){if(!p.modalities||!p.modalities.length)p.modalities=sp.modalities||[];if(!p.exercises||!p.exercises.length)p.exercises=sp.exercises||[];if(!p.home||!p.home.length)p.home=sp.home||[];if(!p.homeFreq)p.homeFreq=sp.homeFreq||"";}if(!p.homeLinks)p.homeLinks=[];});}
  // One-time self-heal: sessions logged with inline billing (before this fix) never had
  // `paid` set to true, only ever left undefined — while sessions from "Next Session" (no
  // billing) always explicitly have paid:false. That distinction lets us safely tell the two
  // apart and fix only the buggy ones, without touching genuinely-unpaid sessions.
  (DB.plans||[]).forEach(function(p){(p.visits||[]).forEach(function(v){if(v.paid===undefined)v.paid=true;});});
 } else {
  // First login for this clinic — nothing in Supabase yet, seed it fresh
  DB=JSON.parse(JSON.stringify(seed));
  await sbSaveData();
 }
}

/* ── IndexedDB auto-backup ────────────────────────────────────────────────── */
const IDB_NAME="physioverse_backup",IDB_STORE="snapshots",IDB_PDF_STORE="pdfs",IDB_MAX=7;
let _idb=null;
function idbOpen(){return new Promise((ok,err)=>{if(_idb)return ok(_idb);const r=indexedDB.open(IDB_NAME,2);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE,{keyPath:"ts"});if(!db.objectStoreNames.contains(IDB_PDF_STORE))db.createObjectStore(IDB_PDF_STORE,{keyPath:"assessId"});};r.onsuccess=e=>{_idb=e.target.result;ok(_idb);};r.onerror=e=>err(e);});}
// ── Save/fetch the actual generated PDF file (binary blob) locally in IndexedDB ──
function idbSavePDF(assessId,blob,fname){return idbOpen().then(db=>new Promise((ok,err)=>{const tx=db.transaction(IDB_PDF_STORE,"readwrite");tx.objectStore(IDB_PDF_STORE).put({assessId,blob,fname,ts:Date.now()});tx.oncomplete=()=>ok(true);tx.onerror=e=>err(e);})).catch(()=>false);}
function idbGetPDF(assessId){return idbOpen().then(db=>new Promise((ok,err)=>{const tx=db.transaction(IDB_PDF_STORE,"readonly");const req=tx.objectStore(IDB_PDF_STORE).get(assessId);req.onsuccess=e=>ok(e.target.result||null);req.onerror=e=>err(e);})).catch(()=>null);}
function idbSnap(){
  idbOpen().then(db=>{
    const snap={ts:Date.now(),label:new Date().toLocaleString("en-IN"),data:JSON.stringify(DB)};
    const tx=db.transaction(IDB_STORE,"readwrite");const st=tx.objectStore(IDB_STORE);
    st.add(snap);
    // prune: keep only last IDB_MAX
    const cr=st.openCursor(null,"prev");let skip=0;
    cr.onsuccess=e=>{const c=e.target.result;if(!c)return;if(skip++<IDB_MAX)c.continue();else{c.delete();c.continue();}};
  }).catch(()=>{});
}
function idbList(){return idbOpen().then(db=>new Promise((ok,err)=>{const tx=db.transaction(IDB_STORE,"readonly");const st=tx.objectStore(IDB_STORE);const all=st.getAll();all.onsuccess=e=>ok(e.target.result.reverse());all.onerror=err;}));}
function idbRestore(ts){idbOpen().then(db=>new Promise((ok,err)=>{const tx=db.transaction(IDB_STORE,"readonly");const req=tx.objectStore(IDB_STORE).get(ts);req.onsuccess=e=>ok(e.target.result);req.onerror=err;})).then(snap=>{if(!snap)return;if(!confirm("Restore backup from "+snap.label+"? Current data will be replaced.")){return;}DB=JSON.parse(snap.data);save();fillBranches();render();alert("Restored! ✅");});}
function showBackups(){

  });}

// Full backup, like a WhatsApp-style export: bundles the data (same as the .json backup) together
// with the ACTUAL uploaded files (X-rays, scans, assessment PDFs, expense bill photos) into one
// zip, instead of just the Supabase storage paths that point to them.
async function exportFullBackup(){
  if(!sb){alert("Supabase isn't connected — can't fetch your uploaded documents right now. Use the plain .json backup instead.");return;}
  if(typeof JSZip==="undefined"){alert("Couldn't load the zip library — check your internet connection and try again.");return;}
  if(!confirm("This downloads all your data PLUS every uploaded document, X-ray, scan and bill photo into one .zip file. With this many files it can take a little while and uses your data connection. Continue?"))return;

  // Collect every (bucket, path, savedAsName) file reference in the database, de-duplicated.
  const files=[];const seen=new Set();
  function add(bucket,path,name){
    if(!path)return;
    const key=bucket+"::"+path;
    if(seen.has(key))return;
    seen.add(key);
    files.push({bucket,path,name:name||path.split("/").pop()});
  }
  (DB.patients||[]).forEach(p=>(p.docs||[]).forEach(d=>{
    if(!d.path)return; // older records were metadata-only, with no actual file uploaded
    add(d.type==="assessment-pdf"?"assessment-pdfs":"patient-documents",d.path,p.name+" — "+d.n);
  }));
  (DB.assessments||[]).forEach(a=>{
    if(a.assessFilePath)add("assessment-pdfs",a.assessFilePath,(a.assessFile||"scan"));
  });
  (DB.expenses||[]).forEach(e=>{if(e.billPath)add("bill-photos",e.billPath,e.bill||"bill");});

  _fullBackupProgress("Preparing…");
  const zip=new JSZip();
  zip.file("data.json",JSON.stringify(DB,null,2));
  zip.file("README.txt","PhysioMind full backup — "+todayISO+"\n\n"+
    "• data.json = all clinic records (patients, appointments, assessments, invoices, etc.)\n"+
    "• files/ = the actual uploaded documents (X-rays, scans, assessment PDFs, bill photos) referenced from data.json\n\n"+
    "To restore the records, use Settings → Restore from backup with data.json.\n"+
    "Restoring uploaded files themselves isn't automated yet — this zip is your independent copy of them.");

  let ok=0,failedCount=0,failed=[],bytesDone=0;
  function fmtMB(n){return (n/1048576).toFixed(1)+" MB";}
  // Fetch files with limited concurrency (6 at a time) instead of one-by-one — with a few hundred
  // documents, sequential fetching would take far too long. This keeps it fast without hammering
  // Supabase with hundreds of simultaneous requests.
  let nextIdx=0;
  async function worker(){
    while(nextIdx<files.length){
      const i=nextIdx++;const f=files[i];
      try{
        const {data,error}=await sb.storage.from(f.bucket).createSignedUrl(f.path,3600);
        if(error||!data)throw error||new Error("no signed url");
        const resp=await fetch(data.signedUrl);
        if(!resp.ok)throw new Error("fetch failed");
        const blob=await resp.blob();
        zip.file("files/"+f.bucket+"/"+f.path,blob);
        ok++;bytesDone+=blob.size||0;
      }catch(e){failedCount++;failed.push(f.name);}
      _fullBackupProgress("Downloading documents… "+(ok+failedCount)+" of "+files.length+" ("+fmtMB(bytesDone)+" so far)");
    }
  }
  _fullBackupProgress("Downloading documents… 0 of "+files.length);
  await Promise.all(Array.from({length:Math.min(6,files.length)||1},worker));

  _fullBackupProgress("Zipping "+ok+" file(s)…");
  const content=await zip.generateAsync({type:"blob",compression:"DEFLATE"},(meta)=>{
    _fullBackupProgress("Zipping… "+Math.round(meta.percent)+"%");
  });
  _fullBackupDone();

  const a=document.createElement("a");a.href=URL.createObjectURL(content);a.download="PhysioMind_full_backup_"+todayISO+".zip";a.click();
  localStorage.setItem("pm_last_dl",Date.now());
  localStorage.setItem("pm_last_full_dl",Date.now());
  localStorage.setItem("pm_last_full_size",content.size);

  if(failed.length){
    alert("Backup downloaded ("+fmtMB(content.size)+"), but "+failed.length+" file(s) couldn't be fetched (they may have been deleted from storage):\n\n"+failed.slice(0,10).join("\n")+(failed.length>10?"\n…and "+(failed.length-10)+" more":""));
  }else{
    alert("Full backup downloaded — "+fmtMB(content.size)+", "+ok+" document(s) included.");

 const ys=p=>padT+(10-p)*(H-padT-padB)/10;
 const pts=v.map((s,i)=>[xs(i),ys(+s.pain)]);
 const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
 const col=p=>+p<=3?"#16a34a":+p<=6?"#d97706":"#dc2626";

 return `<div style="display:flex;justify-content:space-between;align-items:center"><b class="muted">Pain trend (VAS 0–10)</b><span class="tag ${last<=first?'green':'red'}">${first} ${arrow} ${last} / 10</span></div>
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;margin:4px 0 2px">
   ${[0,5,10].map(g=>`<line x1="${padL}" y1="${ys(g)}" x2="${W-6}" y2="${ys(g)}" stroke="#e6e9f0" stroke-width="1"/><text x="2" y="${ys(g)+3}" font-size="9" fill="#6b7589">${g}</text>`).join("")}
   <path d="${line}" fill="none" stroke="#2563eb" stroke-width="2.5"/>
   ${pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="${col(v[i].pain)}"/><text x="${p[0]}" y="${p[1]-7}" font-size="10" fill="#1a2233" text-anchor="middle">${v[i].pain}</text><text x="${p[0]}" y="${H-6}" font-size="9" fill="#6b7589" text-anchor="middle">#${v[i].n}</text>`).join("")}

function pgBar(total,page,setFn){

}

function sendHomeWA(pid){
  const p=pById(pid);
  const hp=DB.plans.filter(t=>t.pid===pid&&t.home&&Array.isArray(t.home)&&t.home.length);
  const first=p.name.split(' ')[0];
  let msg=`Hi ${first} 👋\n\nHere are your home exercises from *${DB.settings.clinic}*:\n\n`;
  hp.forEach(t=>{
    msg+=`*${t.diagnosis}*`;
    if(t.homeFreq) msg+=` — ${t.homeFreq}`;
    msg+=`\n`;
    (Array.isArray(t.home)?t.home:[]).forEach((e,i)=>{msg+=`${i+1}. ${e}\n`;});
    if(t.homeLinks&&t.homeLinks.length){
      msg+=`\n📎 *Exercise videos:*\n`;
      t.homeLinks.forEach(l=>{if(l.name&&l.link)msg+=`▶ ${l.name}: ${l.link}\n`;});
    }
    msg+=`\n`;
  });
  msg+=`Do these gently and stop if pain increases.\nSee you at your next session! 💪\n— Team ${DB.settings.clinic}`;
  sendWA(pid,'Home Plan','Home exercises sent',msg);
  closeModal();
}

function uploadDoc(id){
  let inp=document.getElementById("_docFileInput");
  if(!inp){inp=document.createElement("input");inp.type="file";inp.id="_docFileInput";inp.accept="image/*,application/pdf";inp.style.display="none";document.body.appendChild(inp);}
  inp.value="";
  inp.onchange=async function(){
    const rawFile=inp.files&&inp.files[0];if(!rawFile)return;
    if(rawFile.size>8*1024*1024){alert("File is too large (max 8MB). Please choose a smaller file or take a lower-res photo.");return;}
    if(!sb){alert("Supabase isn't connected — can't upload right now.");return;}
    const p=pById(id);
    toast("Uploading…",8000);
    const file=await compressImage(rawFile);
    const path=id+"/"+Date.now()+"_"+file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
    const {error}=await sb.storage.from("patient-documents").upload(path,file,{upsert:false,contentType:file.type});
    if(error){alert("Upload failed: "+error.message);return;}
    (p.docs=p.docs||[]).push({n:file.name,d:todayISO,path,type:file.type&&file.type.indexOf("pdf")>-1?"pdf":"image"});
    save();toast("✓ Uploaded");patientView(id);
  };
  inp.click();
}

function apptForm(date,time,ther){const pts=DB.patients.filter(p=>!MYTHER||p.therapist===MYTHER);

function toggleQuickAddPatient(){const b=document.getElementById("qap_box");const show=b.style.display==="none";b.style.display=show?"block":"none";if(show)document.getElementById("qap_name").focus();}
function quickAddPatient(){
 const name=(document.getElementById("qap_name").value||"").trim();
 if(!name){alert("Enter the patient's name.");return;}
 const phone=(document.getElementById("qap_phone").value||"").trim();
 const therEl=document.getElementById("a_ther");
 const _np={id:uid("p"),since:todayISO,sinceTime:nowTime(),wallet:0,docs:[],name,phone,dob:"",age:"",gender:"",condition:"",
  therapist:(therEl&&therEl.value)||(DB.staff.find(s=>s.role.includes("Physio"))||{}).name||"",
  branch:curBranch()==="all"?DB.branches[0].id:curBranch()};
 DB.patients.push(_np);
 logAudit("Patient Added","Quick-added while booking (name only, profile pending)",_np.name);
 save();
 const sel=document.getElementById("a_pid");
 const opt=document.createElement("option");
 opt.value=_np.id;opt.text=_np.name+(phone?" — "+phone:"")+" · (profile pending)";
 sel.add(opt,sel.options[0]||null);
 opt.selected=true;
 sel.value=_np.id;
 document.getElementById("qap_name").value="";document.getElementById("qap_phone").value="";
 document.getElementById("qap_box").style.display="none";
}
function saveAppt(){const v=k=>document.getElementById(k).value;
 const selEl=document.getElementById("a_pid");const pid=selEl.value;
 if(!pid||!DB.patients.some(x=>x.id===pid)){alert("Please select a patient first — search for an existing one, or tap '+ New patient' to add one, then choose them from the list before booking.");return;}
 const p=pById(pid);const dt=v("a_date");
 // Repeat settings
 const repDays=Array.from(document.querySelectorAll(".rep_day:checked")).map(x=>x.value);
 const repWeeks=Math.max(1,+(v("rep_weeks")||1));
 const dayMap={Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6,Sun:0};
 const addAppt=(dateStr)=>{
  // Only skip if this exact same patient is already booked with this therapist at this exact
  // date/time (true accidental duplicate). Multiple different patients at the same slot with
  // the same therapist are allowed — that's the therapist's/clinic's call (e.g. group sessions).
  if(DB.appointments.some(a=>a.date===dateStr&&a.time===v("a_time")&&a.therapist===v("a_ther")&&a.pid===pid))return;
  DB.appointments.push({id:uid("a"),pid,date:dateStr,time:v("a_time"),type:v("a_type"),therapist:v("a_ther"),status:"Confirmed",branch:p.branch});
  logAudit("Appointment","Booked "+dateStr+" "+v("a_time")+" with "+v("a_ther"),p.name);
 };
 addAppt(dt);
 if(repDays.length>0){
  const base=new Date(dt+"T00:00:00");let count=0;
  for(let w=0;w<repWeeks;w++){for(let d=1;d<=7;d++){const nd=new Date(base);nd.setDate(base.getDate()+w*7+d);
   const dayN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][nd.getDay()];
   if(repDays.includes(dayN)){addAppt(localISO(nd));count++;}}}
  if(count>0)alert(count+" additional appointment"+(count>1?"s":"")+" booked ("+repDays.join(", ")+" for "+repWeeks+" week"+(repWeeks>1?"s":"")+").");
 }
 calDate=dt;save();closeModal();render();}

function setTreatStatus(planId,status){
  const t=DB.plans.find(x=>x.id===planId);if(!t)return;
  const p=pById(t.pid);const pname=p?p.name:'';
  t.status=status;
  if(status==='Completed'&&!t.completedAt)t.completedAt=todayISO;
  if(status!=='Completed')t.completedAt=null;

 html+='</div></div>';

function delSession(planId,sid){if(CURROLE!=='owner'){alert("Only the owner can delete sessions.");return;}if(!confirm("Remove this session entry?"))return;const t=DB.plans.find(x=>x.id===planId);t.visits=(t.visits||[]).filter(s=>s.id!==sid);if(t.done>0)t.done--;save();render();}
function delPlan(planId){
  if(CURROLE!=='owner'){alert("Only the owner can delete treatment plans.");return;}
  const t=DB.plans.find(x=>x.id===planId);if(!t)return;
  const p=pById(t.pid);const pname=p?p.name:'this patient';
  const sessionCount=(t.visits||[]).length;
  if(!confirm("Delete this treatment plan for "+pname+"?\n\n"+sessionCount+" logged session(s) will also be removed. This cannot be undone."))return;
  if(!confirm("Are you absolutely sure? Tap OK to confirm permanent deletion."))return;
  DB.plans=DB.plans.filter(x=>x.id!==planId);
  logAudit("Treatment plan","Deleted plan ("+sessionCount+" sessions)",pname);
  save();render();toast("✓ Treatment plan deleted");
}

function saveSessionPayment(planId,sid){
 var v=function(k){var el=document.getElementById(k);return el?el.value:"";};
 var t=DB.plans.find(function(x){return x.id===planId;});
 var p=pById(t.pid);
 var pay=v("s_pay"),fee=+v("s_fee")||0;
 var partialAmt=+v("s_partial")||0;
 var addConsult=document.getElementById("s_add_consult")&&document.getElementById("s_add_consult").checked;
 var consultFee=addConsult?(+(v("s_consult_fee"))||0):0;
 var corpName=v("s_corp_name");
 var branch=DB.patients.find(function(x){return x.id===t.pid;})?DB.patients.find(function(x){return x.id===t.pid;}).branch||"b1":"b1";
 // Build invoice number
 var invNum=nextInvNo();
 DB.invoices=DB.invoices||[];
 if(pay==="No charge"){
  // Log as complimentary invoice
  DB.invoices.push({id:invNum,pid:t.pid,date:todayISO,time:nowTime(),items:[{d:"Physiotherapy session (complimentary)",qty:1,rate:0}],gst:0,status:"Paid",mode:"No charge",branch:branch});
 } else if(pay==="Package session"){
  // Deduct from patientPkgs. The session itself is already fully paid for as part of the
  // package purchase, so it's logged at ₹0 here — charging the session fee again would be
  // double-billing on top of the package price already collected.
  var pkg=(DB.patientPkgs||[]).find(function(pk){return pk.pid===t.pid&&pk.status==="Active"&&pk.used<pk.total&&(!pk.expires||pk.expires>=todayISO);});
  if(pkg){pkg.used=(pkg.used||0)+1;if(pkg.used>=pkg.total)pkg.status="Completed";}
  else{alert("No active package found for this patient. Invoice logged as package.");}
  var pkgItems=[{d:"Physiotherapy session (covered by package)",qty:1,rate:0}];
  if(consultFee>0)pkgItems.push({d:"Consultation fee",qty:1,rate:consultFee});
  DB.invoices.push({id:invNum,pid:t.pid,date:todayISO,time:nowTime(),items:pkgItems,gst:0,status:"Paid",mode:"Package",branch:branch});
 } else if(pay==="Wallet (advance)"){
  // Deduct from wallet
  var items=[{d:"Physiotherapy session",qty:1,rate:fee}];
  if(consultFee>0)items.push({d:"Consultation fee",qty:1,rate:consultFee});
  var sub=items.reduce(function(s,i){return s+i.qty*i.rate;},0);
  var total=sub;
  var bal=p.wallet||0;
  p.wallet=Math.max(0,bal-total);
  var status=bal>=total?"Paid":"Partial";
  DB.invoices.push({id:invNum,pid:t.pid,date:todayISO,time:nowTime(),items:items,gst:0,status:status,mode:"Wallet",branch:branch,note:"Wallet deduction: ₹"+Math.min(bal,total)+", balance remaining: ₹"+(p.wallet)});
 } else {
  // UPI / Cash / Card / Corporate / Bill later
  var items=[{d:"Physiotherapy session",qty:1,rate:fee}];
  if(consultFee>0)items.push({d:"Consultation fee",qty:1,rate:consultFee});
  var status=pay==="Bill later"?"Pending":(partialAmt>0&&partialAmt<fee?"Partial":"Paid");
  var invMode=pay==="Corporate / Insurance"?"Corporate":pay;
  var inv={id:invNum,pid:t.pid,date:todayISO,time:nowTime(),items:items,gst:0,status:status,mode:invMode,branch:branch};
  if(partialAmt>0&&partialAmt<fee){inv.paid=partialAmt;inv.pending=fee-partialAmt;}
  if(corpName)inv.corp=corpName;
  DB.invoices.push(inv);logAudit("Invoice","Invoice created",inv.patient||"");
 }
 // Mark session as paid
 var sess=(t.visits||[]).find(function(x){return x.id===sid;});
 if(sess)sess.paid=true;
 save();closeModal();render();
}
// Best assessment to pull treatment-plan data from: most recent one for this patient
// that actually has usable clinical content (diagnosis, modalities, exercises or home programme).
// Not restricted to mode==='template' so it still works if an assessment's mode is unset/legacy.
function latestAssessmentFor(pid){
 return (DB.assessments||[]).filter(a=>a.pid===pid&&((a.modalities&&a.modalities.length)||(a.exercises&&a.exercises.length)||(a.home&&a.home.length)||a.dx))

}

function updateSessionBillSummary(){
 const pay=document.getElementById("s_pay");if(!pay)return;
 const mode=pay.value;
 const fee=+document.getElementById("s_fee").value||0;
 const partialWrap=document.getElementById("s_partial_wrap");
 const corpWrap=document.getElementById("s_corporate_wrap");
 if(partialWrap)partialWrap.style.display=(mode==="UPI"||mode==="Cash"||mode==="Card")?"block":"none";
 if(corpWrap)corpWrap.style.display=(mode==="Corporate / Insurance")?"block":"none";
 const partial=+((document.getElementById("s_partial")||{}).value)||0;
 const remaining=fee>0&&partial>0&&partial<fee?fee-partial:0;
 const remEl=document.getElementById("s_partial_remaining");
 if(remEl)remEl.textContent=remaining>0?"₹"+remaining.toLocaleString("en-IN")+" will be pending":"";
 const addConsult=document.getElementById("s_add_consult")&&document.getElementById("s_add_consult").checked;
 const consultFee=addConsult?(+((document.getElementById("s_consult_fee")||{}).value)||0):0;
 const summary=document.getElementById("s_bill_summary");
 if(!summary)return;
 const lines=[];
 if(mode==="Package session"){lines.push("Session: covered by package (₹0)");}
 else if(mode==="No charge"){lines.push("Session: complimentary (₹0)");}
 else{
   if(partial>0&&partial<fee)lines.push("Session: ₹"+fee.toLocaleString("en-IN")+" (collecting ₹"+partial.toLocaleString("en-IN")+" now, ₹"+(fee-partial).toLocaleString("en-IN")+" pending)");
   else lines.push("Session: ₹"+fee.toLocaleString("en-IN"));
 }
 if(consultFee>0){lines.push("Consult: ₹"+consultFee.toLocaleString("en-IN"));}
 summary.innerHTML=lines.map(l=>"✓ "+l).join("<br>");
 summary.style.display=lines.length?"block":"none";
}

function savePlan(id){const v=k=>document.getElementById(k).value;
 const mods=v("t_mod").split("\n").filter(x=>x.trim());
 const obj={pid:v("t_pid"),diagnosis:v("t_dx"),goal:v("t_goal"),sessions:+v("t_sess"),done:+v("t_done"),
   modalities:mods,exercises:v("t_ex").split("\n").filter(x=>x.trim()),home:v("t_home").split("\n").filter(x=>x.trim()),homeFreq:v("t_homefreq"),homeLinks:(window._hl||[]).filter(l=>l.name||l.link),notes:v("t_notes")};
 if(id){
  Object.assign(DB.plans.find(x=>x.id===id),obj);
  const prog=document.getElementById("t_progress")?document.getElementById("t_progress").value.trim():"";
  const pain=document.getElementById("t_pain")?document.getElementById("t_pain").value:"";
  if(prog||pain){
   if(!DB.visitNotes)DB.visitNotes=[];
   DB.visitNotes.push({id:uid("vn"),planId:id,pid:obj.pid,date:todayISO,pain:pain,note:prog,by:ROLES[CURROLE].name});
  }
 }else{DB.plans.push({id:uid("t"),...obj});}save();closeModal();render();}
function pullFromAssessment(){
 const pidEl=document.getElementById("t_pid");if(!pidEl)return;
 const pid=pidEl.value;
 const a=latestAssessmentFor(pid);
 if(!a){alert("No assessment with treatment details (diagnosis, modalities, exercises or home programme) found for this patient yet.");return;}
 const hasExisting=["t_dx","t_mod","t_ex","t_home"].some(k=>{const el=document.getElementById(k);return el&&el.value&&el.value.trim();});
 if(hasExisting&&!confirm("This will overwrite the diagnosis, goal, modalities, exercises, home programme and notes below with data from the assessment dated "+fmtDate(a.date)+". Continue?"))return;
 const set=(k,val)=>{const el=document.getElementById(k);if(el)el.value=val;};
 set("t_dx",a.dx||"");
 set("t_goal",a.stg||a.ltg||"");
 if(a.sessions)set("t_sess",a.sessions);
 set("t_mod",(a.modalities||[]).join("\n"));
 set("t_ex",(a.exercises||[]).join("\n"));
 set("t_home",(a.home||[]).join("\n"));
 set("t_homefreq",a.homeFreq||"");
 set("t_notes",a.advice||"");
 alert("Pulled diagnosis, goal, modalities, exercises and home programme from the assessment dated "+fmtDate(a.date)+".");
}

function filterPatients(q){

  const base=_ptab==="active"?all.filter(p=>(p.status||"Active")==="Active"):_ptab==="inactive"?all.filter(p=>p.status==="Inactive"):all;
  const monthFiltered=_patMonth?base.filter(p=>(p.since||"").startsWith(_patMonth)):base;

    const hay=(p.name+" "+(p.dob||"")+" "+patientCode(p)+" "+p.condition).toLowerCase();

  }).reverse().sort((a,b)=>(b.since||"").localeCompare(a.since||"")||(b.sinceTime||"").localeCompare(a.sinceTime||""));

}

 openModal(`<div class="modal-h"><h3>Mark Invoice Paid</h3><button class="x" onclick="closeModal()">×</button></div>

 </div>

function doMarkPaid(id){const mode=document.getElementById("mp_mode").value;const i=DB.invoices.find(x=>x.id===id);const p=pById(i.pid);
 if(mode==="Wallet (advance)"){const gross=invTotals(i).total;if((p.wallet||0)<gross){alert("Wallet balance ("+inr(p.wallet||0)+") is insufficient for "+inr(gross)+". Top up first.");return;}p.wallet-=gross;i.mode="Wallet";}
 else if(mode==="Corporate / Insurance")i.mode="Corporate";
 else i.mode=mode;
 i.status="Paid";i.paidAt=todayISO;if(!i.total){i.total=invTotals(i).total;}
 logAudit("Payment received",inr(invTotals(i).total)+" via "+i.mode+" for "+i.id,p?p.name:"");
 save();closeModal();render();}

 function rule(){doc.setDrawColor(200);doc.line(M,y,W-M,y);y+=4;}

 if(!rows.length){alert("Add at least one service.");return;}
 const items=rows.map(r=>({d:r.querySelector(".inv-d").value||"Service",qty:+(r.querySelector(".inv-q").value)||1,rate:+(r.querySelector(".inv-r").value)||0}));
 const subtotal=items.reduce((s,i)=>s+i.rate*i.qty,0);
 const gross=subtotal;
 let inv={id:nextInvNo(),pid,date:todayISO,time:nowTime(),items,gst:0,branch:p.branch,total:gross};
 if(mode==="Package session"){const pk=DB.patientPkgs.find(k=>k.pid===pid&&k.status==="Active"&&k.used<k.total&&(!k.expires||k.expires>=todayISO));if(!pk){alert("No active (non-expired) package with sessions left for this patient.");return;}pk.used++;inv.items=items.map(i=>({...i,d:i.d+" (package)",rate:0}));inv.total=0;inv.status="Paid";inv.mode="Package";inv.paidAt=todayISO;}
 else if(mode==="Wallet"){if((p.wallet||0)<gross){alert("Insufficient wallet balance ("+inr(p.wallet||0)+"). Top up first.");return;}p.wallet-=gross;inv.status="Paid";inv.mode="Wallet";inv.paidAt=todayISO;}
 else if(mode==="Pending"){inv.status="Pending";inv.mode="—";}

// Compresses a photo before upload — resizes to a max dimension and re-encodes as JPEG.
// Cuts typical phone-camera photos (often 3-8MB) down to a few hundred KB while staying
// clearly readable on screen. Only applies to images; PDFs pass through untouched.
function compressImage(file,maxDim,quality){
 maxDim=maxDim||1600;quality=quality||0.75;
 return new Promise((resolve)=>{
  if(!file.type||file.type.indexOf("image")!==0){resolve(file);return;}
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
   URL.revokeObjectURL(url);
   let w=img.width,h=img.height;
   if(w>maxDim||h>maxDim){if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}else{w=Math.round(w*maxDim/h);h=maxDim;}}
   const canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;
   canvas.getContext("2d").drawImage(img,0,0,w,h);
   canvas.toBlob((blob)=>{
    if(!blob){resolve(file);return;}
    const compressed=new File([blob],(file.name||"photo").replace(/\.\w+$/,"")+".jpg",{type:"image/jpeg"});
    resolve(compressed.size<file.size?compressed:file); // keep original if compression didn't actually help
   },"image/jpeg",quality);
  };
  img.onerror=()=>resolve(file); // if it can't load as an image, upload the original untouched
  img.src=url;
 });
}

function getAttendance(sid,date){return (DB.attendance||[]).find(a=>a.sid===sid&&a.date===date);}
function setAttendance(sid,date,status){
 DB.attendance=DB.attendance||[];
 const rec=DB.attendance.find(a=>a.sid===sid&&a.date===date);
 if(rec)rec.status=status;else DB.attendance.push({id:uid("at"),sid,date,status});
 save();
}
function monthAttendance(sid,ym){
 const recs=(DB.attendance||[]).filter(a=>a.sid===sid&&a.date.startsWith(ym));
 let present=0,leave=0,half=0;
 recs.forEach(r=>{if(r.status==="Present")present++;else if(r.status==="Half-day"){present+=0.5;half++;}else if(r.status==="Leave")leave++;});
 return {present,leave,half,marked:recs.length};
}
// Yearly breakdown — one entry per month for the given year (12 entries), so an owner
// can see attendance patterns over a whole year without clicking through month by month.
function yearAttendance(sid,year){
 const months=[];
 for(let m=1;m<=12;m++){
   const ym=year+"-"+String(m).padStart(2,"0");
   months.push({ym,label:MNAMES[m-1],...monthAttendance(sid,ym)});
 }
 const totalPresent=months.reduce((s,m)=>s+m.present,0);
 const totalLeave=months.reduce((s,m)=>s+m.leave,0);
 const totalMarked=months.reduce((s,m)=>s+m.marked,0);
 return {months,totalPresent,totalLeave,totalMarked};
}

 return `<select onchange="setTmplSel('${recId}',this.value)" style="font-size:11.5px;padding:3px 6px;border-radius:6px;border:1px solid var(--line);margin-bottom:5px;max-width:100%">${list.map(t=>`<option value="${t.id}" ${t.id===cur?'selected':''}>${t.icon} ${t.label}</option>`).join('')}</select>`;}
function tmplMsgFor(recId,cat,data){const list=tmplsFor(cat);if(!list.length)return"";const cur=window._tmplSel[recId]||list[0].id;const t=list.find(x=>x.id===cur)||list[0];return fillTemplate(t.msg,data);}
function tmplModal(id){const t=id?DB.msgTemplates.find(x=>x.id===id):{id:"",category:"Appointment",label:"",tag:"blue",icon:"📝",msg:""};
 const cats=[...new Set(DB.msgTemplates.map(x=>x.category))];
 openModal(`<div class="modal-h"><h3>${id?"Edit":"New"} Template</h3><button class="x" onclick="closeModal()">×</button></div>
 <div class="modal-b">
  <div class="field"><label>Category</label><input list="tmplCats" id="tm_cat" value="${t.category}" placeholder="Appointment, Payment, Reschedule..."><datalist id="tmplCats">${cats.map(c=>`<option value="${c}">`).join('')}</datalist></div>
  <div class="field"><label>Title</label><input id="tm_label" value="${(t.label||"").replace(/"/g,"&quot;")}" placeholder="e.g. Pending Payment — Gentle Reminder"></div>
  <div class="field"><label>Message</label><textarea id="tm_msg" rows="6" style="width:100%;font-size:13px;padding:8px;border-radius:8px;border:1px solid var(--line)">${t.msg||""}</textarea>
   <div class="muted" style="font-size:11px;margin-top:4px">Placeholders: [Patient Name] [Date] [Time] [Therapist Name] [Phone] [Clinic] [Due Amount] [Paid] [Remaining] [Invoice ID] [Amount] [UPI ID] [Package Name] [Sessions Left] [Expiry Date] [Balance]</div>
  </div>
 </div>
 <div class="modal-f">${id?`<button class="btn sec" style="color:var(--danger)" onclick="deleteTmpl('${id}')">Delete</button>`:""}<button class="btn sec" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveTmpl('${id||""}')">Save</button></div>`,true);}
function saveTmpl(id){const v=k=>document.getElementById(k).value.trim();const cat=v("tm_cat")||"Other";const label=v("tm_label");const msg=document.getElementById("tm_msg").value;
 if(!label||!msg){alert("Please fill title and message");return;}
 if(id){const t=DB.msgTemplates.find(x=>x.id===id);t.category=cat;t.label=label;t.msg=msg;}
 else{DB.msgTemplates.push({id:uid("tm"),category:cat,label,tag:"blue",icon:"📝",msg});}
 save();closeModal();render();}
function deleteTmpl(id){if(!confirm("Delete this template?"))return;DB.msgTemplates=DB.msgTemplates.filter(x=>x.id!==id);save();closeModal();render();}
views.reminders=()=>{
 const clinic=DB.settings.clinic||"PhysioMind";
 const fmtAppt=a=>fmtDate(a.date).replace(/ \d{4}$/,'')+", "+a.time;
 // Data sets for each tab
 const upcoming=DB.appointments.filter(inBranch).filter(a=>!MYTHER||a.therapist===MYTHER).filter(a=>a.date>=todayISO&&a.status!=="Cancelled"&&a.status!=="Completed").filter(a=>!(DB.dismissedReminders||[]).includes(a.id)).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
 const dues=DB.invoices.filter(inBranch).filter(i=>i.status==="Pending"||i.status==="Partial");
 const missed=DB.appointments.filter(inBranch).filter(a=>a.date<todayISO&&a.status==="Pending").sort((a,b)=>b.date.localeCompare(a.date));
 const cancelled=DB.appointments.filter(inBranch).filter(a=>a.status==="Cancelled").sort((a,b)=>b.date.localeCompare(a.date));
 const reschedList=[...missed,...cancelled].slice(0,30);
 const pkgList=(DB.patientPkgs||[]).filter(k=>inBranch(pById(k.pid))).filter(k=>{
   const bal=(k.price||0)-(k.paidAmount!=null?k.paidAmount:(k.price||0));
   const daysLeft=k.expires?Math.ceil((new Date(k.expires)-new Date(todayISO))/864e5):999;
   const sessLeft=(k.total||0)-(k.used||0);
   return k.status==="Active"&&(bal>0||(daysLeft<=14&&daysLeft>=0&&sessLeft>0)||sessLeft<=0);
 });
 const sent=DB.reminders||[];
 const TEMPLATES=DB.msgTemplates;
 // Tab bar
 const tabs=[
  {id:"appts",label:"📅 Appointments",count:upcoming.length},
  {id:"payments",label:"💰 Payments",count:dues.length},
  {id:"reschedule",label:"🔄 Reschedule",count:reschedList.length},
  {id:"packages",label:"📦 Packages",count:pkgList.length},
  {id:"templates",label:"📋 Templates",count:TEMPLATES.length},
  {id:"sent",label:"✅ Sent",count:sent.length},
 ];
 const tabBar=`<div style="display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none">
  ${tabs.map(t=>`<button onclick="_remTab='${t.id}';render()" style="border:none;background:none;padding:11px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid ${_remTab===t.id?'var(--brand)':'transparent'};color:${_remTab===t.id?'var(--brand)':'var(--muted)'};margin-bottom:-2px">${t.label}${t.count?' <span style="background:var(--line);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700">'+t.count+'</span>':''}</button>`).join('')}
 </div>`;

 // ── TAB: APPOINTMENTS ─────────────────────────────────
 const apptTab=`
  <div style="padding:14px 17px 6px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
   <span class="muted" style="font-size:12.5px">${upcoming.length} upcoming appointments need reminders</span>
  </div>
  ${upcoming.length?upcoming.map(a=>{const p=pById(a.pid);const recId="a_"+a.id;const data={name:p.name,date:fmtDate(a.date),time:a.time,therapist:a.therapist,phone:p.phone};const msg=tmplMsgFor(recId,"Appointment",data)||apptMsg(p,fmtAppt(a));return `<div class="reminder"><div class="r-ico wa">💬</div>
   <div class="r-body">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
     <b>${p.name} <span class="tag blue" style="margin-left:5px">Appointment</span></b>
     <a href="tel:${(p.phone||'').replace(/\D/g,'')}" class="btn sm sec" style="text-decoration:none;padding:4px 10px;font-size:12px">📞 ${p.phone||'Call'}</a>
    </div>
    <div class="muted" style="font-size:12px;margin:2px 0">${fmtDate(a.date)} at ${a.time} · ${a.therapist} · <span class="tag ${apptStatusCls(a)}">${apptStatusLabel(a)}</span></div>
    <div>${tmplSelectHTML(recId,"Appointment")}</div>
    <div class="r-msg" id="rmsg_a_${a.id}">${msg}</div>
    <div style="margin-top:7px;display:flex;gap:7px;flex-wrap:wrap">
     <button class="btn sm" onclick="sendWA('${a.pid}','Appointment','${fmtAppt(a).replace(/'/g,'')}',document.getElementById('rmsg_a_${a.id}').innerText)">📲 WhatsApp</button>
     <button class="btn sm sec" onclick="setApptStatus('${a.id}','Confirmed');render()">✔ Confirm</button>
     <button class="btn danger sec" style="margin-left:auto" onclick="dismissReminder('${a.id}')">🗑 Delete</button>
    </div>
   </div></div>`;}).join(''):'<div class="empty" style="padding:40px">No upcoming appointments 🎉</div>'}`;

 // ── TAB: PAYMENTS ─────────────────────────────────────
 const payTab=`
  <div style="padding:14px 17px 6px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
   <span class="muted" style="font-size:12.5px">${dues.length} pending/partial payments · Total outstanding: <b>${inr(dues.reduce((s,i)=>s+invTotals(i).total,0))}</b></span>
  </div>
  ${dues.length?dues.map(i=>{const p=pById(i.pid);const amt=invTotals(i).total;const recId="p_"+i.id;const data={name:p.name,phone:p.phone,due:inr(amt),invoiceId:i.id,amount:inr(amt),date:fmtDate(i.date),paid:i.paid?inr(i.paid):"",remaining:i.paid?inr(amt-i.paid):""};const msg=tmplMsgFor(recId,"Payment",data)||payMsg(p,inr(amt)+" pending for "+i.id);return `<div class="reminder"><div class="r-ico wa">💬</div>
   <div class="r-body">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
     <b>${p.name} <span class="tag amber" style="margin-left:5px">${i.status}</span></b>
     <span class="muted" style="font-size:12px"><a href="tel:${(p.phone||'').replace(/\D/g,'')}" style="color:var(--accent);text-decoration:none">📞 ${p.phone}</a></span>
    </div>
    <div class="muted" style="font-size:12px;margin:2px 0">${i.id} · ${fmtDate(i.date)} · <b style="color:var(--danger)">${inr(amt)}</b>${i.paid?' · Paid: '+inr(i.paid)+', Balance: '+inr(amt-i.paid):''}</div>
    <div>${tmplSelectHTML(recId,"Payment")}</div>
    <div class="r-msg" id="rmsg_p_${i.id}">${msg}</div>
    <div style="margin-top:7px;display:flex;gap:7px;flex-wrap:wrap">
     <button class="btn sm" onclick="sendWA('${i.pid}','Payment','${inr(amt)} due',document.getElementById('rmsg_p_${i.id}').innerText)">📲 WhatsApp</button>
     <button class="btn sm sec" onclick="markPaid('${i.id}')">✔ Mark paid</button>
     <button class="btn sm sec" onclick="viewInvoice('${i.id}')">🧾 Invoice</button>
    </div>
   </div></div>`;}).join(''):'<div class="empty" style="padding:40px">No outstanding payments 🎉</div>'}`;

 // ── TAB: RESCHEDULE ───────────────────────────────────
 const reschedTab=`
  <div style="padding:14px 17px 6px">
   <span class="muted" style="font-size:12.5px">${missed.length} missed (no-show) + ${cancelled.length} cancelled</span>
  </div>
  ${reschedList.length?reschedList.map(a=>{const p=pById(a.pid);const isNoShow=a.status==="Pending"&&a.date<todayISO;const recId="r_"+a.id;const data={name:p.name,date:fmtDate(a.date),time:a.time,therapist:a.therapist,phone:p.phone};const fallback=isNoShow?`Hi ${p.name.split(' ')[0]}, we missed you at your physio appointment on ${fmtDate(a.date)} at ${a.time} 😔. Please call us to reschedule — Team ${clinic}`:`Hi ${p.name.split(' ')[0]}, your appointment on ${fmtDate(a.date)} was cancelled. Would you like to book a new slot at ${clinic}? Call us anytime — Team ${clinic} 🙏`;const msg=tmplMsgFor(recId,"Reschedule",data)||fallback;return `<div class="reminder"><div class="r-ico wa">💬</div>
   <div class="r-body">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
     <b>${p.name} <span class="tag ${isNoShow?'red':'gray'}" style="margin-left:5px">${isNoShow?'No-show':'Cancelled'}</span></b>
     <span class="muted" style="font-size:12px"><a href="tel:${(p.phone||'').replace(/\D/g,'')}" style="color:var(--accent);text-decoration:none">📞 ${p.phone}</a></span>
    </div>
    <div class="muted" style="font-size:12px;margin:2px 0">${fmtDate(a.date)} at ${a.time} · ${a.therapist}</div>
    <div>${tmplSelectHTML(recId,"Reschedule")}</div>
    <div class="r-msg" id="rmsg_r_${a.id}">${msg}</div>
    <div style="margin-top:7px;display:flex;gap:7px;flex-wrap:wrap">
     <button class="btn sm" onclick="sendWA('${a.pid}','Reschedule','${fmtDate(a.date)}',document.getElementById('rmsg_r_${a.id}').innerText)">📲 WhatsApp</button>
     <button class="btn sm sec" onclick="apptForm('${todayISO}','','');closeModal();apptForm(todayISO)">📅 Book new slot</button>
    </div>
   </div></div>`;}).join(''):'<div class="empty" style="padding:40px">No missed or cancelled appointments 🎉</div>'}`;

 // ── TAB: PACKAGES ─────────────────────────────────────
 const pkgTab=`
  <div style="padding:14px 17px 6px">
   <span class="muted" style="font-size:12.5px">${pkgList.length} package(s) need attention — balance due, expiring soon, or fully used</span>
  </div>
  ${pkgList.length?pkgList.map(k=>{const p=pById(k.pid);const bal=(k.price||0)-(k.paidAmount!=null?k.paidAmount:(k.price||0));const sessLeft=(k.total||0)-(k.used||0);const daysLeft=k.expires?Math.ceil((new Date(k.expires)-new Date(todayISO))/864e5):null;
   const status=bal>0?{tag:'amber',label:'Balance due'}:sessLeft<=0?{tag:'green',label:'Fully used'}:{tag:'amber',label:'Expiring soon'};
   const recId="k_"+k.id;const data={name:p.name,phone:p.phone,pkgName:k.pkg||k.name||'Package',sessionsLeft:sessLeft,expiryDate:fmtDate(k.expires),balance:inr(bal)};
   const fallback=bal>0?`Dear ${p.name.split(' ')[0]}, a balance of ${inr(bal)} is pending on your ${k.pkg||'package'}. Please clear it soon — Team ${clinic}`:sessLeft<=0?`Dear ${p.name.split(' ')[0]}, you've completed all sessions of your ${k.pkg||'package'}! Ask us about renewal — Team ${clinic}`:`Hi ${p.name.split(' ')[0]}, your ${k.pkg||'package'} has ${sessLeft} session(s) left and expires ${fmtDate(k.expires)}. Book soon — Team ${clinic}`;
   const msg=tmplMsgFor(recId,"Package",data)||fallback;
   return `<div class="reminder"><div class="r-ico wa">💬</div>
   <div class="r-body">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
     <b>${p.name} <span class="tag ${status.tag}" style="margin-left:5px">${status.label}</span></b>
     <span class="muted" style="font-size:12px"><a href="tel:${(p.phone||'').replace(/\D/g,'')}" style="color:var(--accent);text-decoration:none">📞 ${p.phone}</a></span>
    </div>
    <div class="muted" style="font-size:12px;margin:2px 0">${k.pkg||k.name||'Package'} · ${k.used||0}/${k.total||0} used${bal>0?' · <b style="color:var(--danger)">'+inr(bal)+' due</b>':''}${daysLeft!=null?' · expires '+fmtDate(k.expires):''}</div>
    <div>${tmplSelectHTML(recId,"Package")}</div>
    <div class="r-msg" id="rmsg_k_${k.id}">${msg}</div>
    <div style="margin-top:7px;display:flex;gap:7px;flex-wrap:wrap">
     <button class="btn sm" onclick="sendWA('${k.pid}','Package','${(k.pkg||'').replace(/'/g,'')}',document.getElementById('rmsg_k_${k.id}').innerText)">📲 WhatsApp</button>

   </div></div>`;}).join(''):'<div class="empty" style="padding:40px">No packages need attention 🎉</div>'}`;

 // ── TAB: TEMPLATES ────────────────────────────────────
 const tmplCatsList=[...new Set(TEMPLATES.map(t=>t.category||"Other"))];
 const tmplTab=`<div style="padding:14px 17px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
   <span class="muted" style="font-size:12.5px">Edit templates or add your own — therapists can customise per category</span>
   <button class="btn sm" onclick="tmplModal()">+ Add Template</button>
  </div>
  ${tmplCatsList.map(cat=>`<div style="padding:10px 17px 0"><div style="font-weight:700;font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin:8px 0 6px">${cat}</div>
  <div class="panel-b tmpl-grid">
  ${TEMPLATES.map((t,i)=>({t,i})).filter(x=>(x.t.category||"Other")===cat).map(({t,i})=>`<div style="border:1px solid var(--line);border-radius:10px;padding:13px">
   <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">

    <span style="font-weight:600;font-size:13px;flex:1">${t.label}</span>

   </div>
   <div id="tmpl_${i}" style="background:var(--bg2);border-radius:7px;padding:9px 11px;font-size:12.5px;line-height:1.55;color:var(--text);white-space:pre-wrap;margin-bottom:9px">${t.msg}</div>
   <div style="display:flex;gap:7px">

    <button class="btn sm" style="background:#25D366" onclick="sendTemplateWA(${i})">📲 WhatsApp</button>
   </div>

  </div></div>`).join('')}`;

 // ── TAB: SENT ─────────────────────────────────────────
 const allSent=(DB.reminders||[]);
 const sentMonths=[...new Set(allSent.filter(r=>r.sentAt).map(r=>r.sentAt.slice(0,7)))].sort().reverse();
 if(!_remSentMonth&&sentMonths.length) _remSentMonth=sentMonths[0];
 const filteredSent=_remSentMonth?allSent.filter(r=>(r.sentAt||"").startsWith(_remSentMonth)):allSent;
 const sentByDate={};
 filteredSent.forEach(r=>{const d=r.sentAt||"other";(sentByDate[d]=sentByDate[d]||[]).push(r);});
 const sentMonthLabel=_remSentMonth?(MNAMES[+_remSentMonth.slice(5,7)-1]+" "+_remSentMonth.slice(0,4)):"All";
 const sentTab=`<div style="padding:12px 17px 10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line)">
  <span style="font-size:13px;font-weight:600;color:var(--muted)">Month</span>
  <select onchange="_remSentMonth=this.value;render()" style="padding:7px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px">
   <option value="" ${!_remSentMonth?"selected":""}>All time</option>
   ${sentMonths.map(m=>`<option value="${m}" ${_remSentMonth===m?"selected":""}>${MNAMES[+m.slice(5,7)-1]} ${m.slice(0,4)}</option>`).join("")}

  <span class="tag teal" style="font-size:12px">${filteredSent.length} message${filteredSent.length!==1?"s":""}</span>

 </div>
 <div style="padding:6px 17px 8px">
  ${Object.keys(sentByDate).sort().reverse().map(d=>{
   const dayItems=sentByDate[d];
   return `<div style="margin:10px 0 4px"><div style="font-size:11.5px;font-weight:700;color:var(--muted);padding:5px 0;border-bottom:1px solid var(--line);margin-bottom:4px">${d!=="other"?fmtDate(d)+" — "+dayItems.length+" sent":"Unknown date"}</div>
    ${dayItems.map(r=>{const p=pById(r.pid);return `<div class="list-row" style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0">
     <div style="flex:1;min-width:0"><b style="font-size:13px">${p.name}</b> <span class="tag ${r.kind==="Payment"?"amber":r.kind==="Reschedule"?"gray":"blue"}" style="font-size:10px;margin-left:4px">${r.kind}</span><div class="muted" style="font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.appt||r.when||""}</div></div>
     <a href="tel:${(p.phone||"").replace(/\D/g,"")}" class="btn sm sec" style="text-decoration:none;padding:4px 10px;font-size:12px;white-space:nowrap;flex-shrink:0">📞 Call</a>
     <button class="btn sm danger sec" style="padding:4px 10px;font-size:12px;flex-shrink:0" onclick="deleteSentReminder('${r.id}')">🗑</button>
    </div>`;
    }).join("")}</div>`;
  }).join("")||'<div class="empty" style="padding:32px 0;text-align:center">No messages sent in ${sentMonthLabel}.<br><span class="muted" style="font-size:12.5px">Select a different month above.</span></div>'}
 </div>`;

 const tabContent={appts:apptTab,payments:payTab,reschedule:reschedTab,packages:pkgTab,templates:tmplTab,sent:sentTab};

 return `<div class="panel" style="padding:0">
  <div style="padding:17px 17px 0">
   <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <h3 style="margin:0">🔔 Reminders</h3>
    <div style="display:flex;gap:8px;align-items:center;font-size:12.5px">
     <span class="muted">Auto-send:</span>
     <span class="tag gray">Off — manual only</span>
    </div>
   </div>
  </div>
  ${tabBar}
  <div style="padding:0 0 4px">
   ${tabContent[_remTab]||tabContent.appts}
  </div>
 </div>`;
};
/* SETTINGS */
views.settings=()=>`<div class="panel" style="max-width:640px"><div class="panel-h"><h3>Clinic Settings</h3></div><div class="panel-b">
  <div class="field"><label>Clinic name</label><input value="${DB.settings.clinic}" onchange="DB.settings.clinic=this.value;save()"></div>
  <div class="field"><label>GSTIN</label><input value="${DB.settings.gstin}" onchange="DB.settings.gstin=this.value;save()"></div>
  <hr class="sep">
  <b>Data &amp; Backup</b><div class="muted" style="font-size:12.5px;margin:6px 0 10px">Your data lives in Supabase (cloud) — the same data shows up on every device you sign into. Download a backup here as an independent copy that doesn't depend on Supabase being reachable.</div>
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px">
   <button class="btn sm" onclick="exportFullBackup()">📦 Download full backup (.zip — includes documents)</button>
   <button class="btn sm sec" onclick="exportDB()">📥 Download data only (.json)</button>
   <label class="btn sm sec" style="cursor:pointer">📤 Restore from backup<input type="file" accept=".json" style="display:none" onchange="importDB(event)"></label>
  </div>
  <div class="muted" style="font-size:11.5px;margin-bottom:6px">
   ${(function(){
     const lastFull=+localStorage.getItem("pm_last_full_dl")||0;
     const lastFullSize=+localStorage.getItem("pm_last_full_size")||0;
     const lastAny=+localStorage.getItem("pm_last_dl")||0;
     const fmtMB2=n=>n?(n/1048576).toFixed(1)+" MB":"";
     const fmtWhen=t=>t?new Date(t).toLocaleString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):"never yet";
     return "Last full backup (with documents): <b>"+fmtWhen(lastFull)+(lastFullSize?" · "+fmtMB2(lastFullSize):"")+"</b><br>Last backup of any kind: <b>"+fmtWhen(lastAny)+"</b>";
