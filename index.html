<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhysioMind — Clinic OS</title>
<style>
:root{
  --bg:#f4f6fb; --card:#fff; --ink:#1a2233; --muted:#6b7589;
  --brand:#2563eb; --brand-dark:#1d4ed8; --brand-soft:#dbeafe;
  --teal:#0d9488; --accent:#2563eb; --warn:#d97706; --danger:#dc2626; --ok:#16a34a;
  --line:#e6e9f0; --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
.app{display:flex;min-height:100vh}
.sidebar{width:236px;background:#0b1b3d;color:#cdd7df;display:flex;flex-direction:column;position:fixed;height:100vh;left:0;top:0}
.brand{padding:18px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:grid;place-items:center;font-weight:800;color:#fff;font-size:16px}
.brand h1{font-size:16px;color:#fff;line-height:1.1}
.brand small{color:#7d93a0;font-size:10px;font-weight:700;letter-spacing:1px}
.nav{padding:8px 10px;flex:1;overflow:auto}
.nav .grp{font-size:10px;letter-spacing:1px;color:#5d7286;font-weight:700;padding:12px 14px 5px}
.nav button{width:100%;text-align:left;background:none;border:none;color:#aebcc7;padding:9px 14px;border-radius:8px;display:flex;align-items:center;gap:11px;font-size:13.5px;margin-bottom:1px}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.active{background:var(--brand);color:#fff;font-weight:600}
.nav .ico{width:19px;text-align:center;font-size:15px}
.side-foot{padding:12px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#7d93a0}
.side-foot b{color:#cdd7df}
.main{margin-left:236px;flex:1;min-width:0}
.apphead{position:sticky;top:0;z-index:20}
.topbar{background:var(--card);border-bottom:1px solid var(--line);padding:13px 26px;display:flex;align-items:center;justify-content:space-between}
.activebar{background:var(--card);border-bottom:1px solid var(--line);display:none}
.abar-inner{padding:8px 26px;display:flex;align-items:center;gap:13px}
.abar-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;white-space:nowrap}
.abar-chips{display:flex;gap:8px;overflow-x:auto}
.achip{display:flex;align-items:center;gap:7px;background:#f4f6fb;border:1px solid var(--line);border-radius:9px;padding:6px 10px;font-size:13px;cursor:pointer;white-space:nowrap}
.achip:hover{border-color:var(--brand);background:var(--brand-soft)}
.achip-av{width:22px;height:22px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:700}
.achip-x{color:var(--muted);font-size:12px;margin-left:1px;font-weight:700}
.achip-x:hover{color:var(--danger)}
.topbar h2{font-size:19px}
.topbar .sub{color:var(--muted);font-size:13px;margin-top:1px}
.topbar .right{display:flex;align-items:center;gap:13px}
.clinic-chip{display:flex;align-items:center;gap:8px;background:var(--brand-soft);color:var(--brand-dark);padding:6px 12px;border-radius:30px;font-weight:600;font-size:13px;border:none}
.content{padding:24px}
.btn{background:var(--brand);color:#fff;border:none;padding:9px 15px;border-radius:8px;font-weight:600;font-size:13.5px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--brand-dark)}
.btn.sec{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.sec:hover{background:#f7f9fc}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.teal{background:var(--teal)}
.btn.danger{background:var(--danger)}
.btn.ghost{background:none;color:var(--muted);border:none;padding:5px}
.btn.ghost:hover{color:var(--ink)}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:17px;box-shadow:var(--shadow)}
.stat .lbl{color:var(--muted);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}
.stat .val{font-size:26px;font-weight:800;margin-top:7px}
.stat .delta{font-size:12px;margin-top:4px;color:var(--ok);font-weight:600}
.stat .ico{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:16px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
.panel-h{padding:14px 17px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.panel-h h3{font-size:15px}
.panel-h .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.panel-b{padding:17px}
.panel-b.flush{padding:0}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:10px 17px;border-bottom:1px solid var(--line);background:#fafbfd}
td{padding:12px 17px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clk:hover{background:#f7fafc;cursor:pointer}
.tag{display:inline-block;padding:3px 9px;border-radius:30px;font-size:11.5px;font-weight:600}
.tag.green{background:#dcfce7;color:#15803d}.tag.blue{background:#dbeafe;color:#1d4ed8}
.tag.amber{background:#fef3c7;color:#b45309}.tag.red{background:#fee2e2;color:#b91c1c}
.tag.gray{background:#eef1f5;color:#5b6677}.tag.teal{background:#ccfbf1;color:#0f766e}
.tag.purple{background:#ede9fe;color:#6d28d9}
.avatar{width:33px;height:33px;border-radius:50%;background:var(--brand);color:#fff;display:inline-grid;place-items:center;font-weight:700;font-size:12.5px;flex-shrink:0}
.avatar.t{background:var(--teal)}
.pcell{display:flex;align-items:center;gap:10px}
.pcell .nm{font-weight:600}.pcell .mt{color:var(--muted);font-size:12px}
.search{display:flex;align-items:center;gap:8px;background:#f4f6fb;border:1px solid var(--line);border-radius:8px;padding:7px 11px;width:240px}
.search input{border:none;background:none;outline:none;width:100%}
.field{margin-bottom:13px}
.field label{display:block;font-weight:600;font-size:12.5px;margin-bottom:5px;color:#3a4456}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:50;overflow:auto}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:15px;width:100%;max-width:540px;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column;max-height:90vh}
.modal.wide{max-width:740px}
.modal-h{padding:16px 21px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-h h3{font-size:16px}
.modal-b{padding:21px;overflow-y:auto;flex:1 1 auto}
.modal-f{padding:15px 21px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px;flex-shrink:0}
.x{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
.two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
.empty{text-align:center;padding:38px;color:var(--muted)}
.muted{color:var(--muted)}
.list-row{padding:12px 0;border-bottom:1px solid var(--line)}
.list-row:last-child{border:none}
.inv{background:#fff;border:1px solid var(--line);border-radius:10px;padding:24px;font-size:13px}
.inv-h{display:flex;justify-content:space-between;border-bottom:2px solid var(--brand);padding-bottom:13px;margin-bottom:13px}
.inv-h h2{color:var(--brand-dark)}
.inv table{margin:13px 0}.inv th,.inv td{padding:7px 9px;font-size:12.5px}
.inv .tot{text-align:right}
.inv .tot div{display:flex;justify-content:space-between;padding:3px 0;width:270px;margin-left:auto}
.inv .tot .grand{font-weight:800;font-size:15px;border-top:2px solid var(--line);padding-top:7px;margin-top:3px}
.reminder{display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--line)}
.reminder:last-child{border:none}
.r-ico{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:17px;flex-shrink:0}
.wa{background:#dcfce7;color:#15803d}.sms{background:#dbeafe;color:#1d4ed8}
.r-body{flex:1}.r-msg{background:#f4f6fb;border-radius:8px;padding:9px 11px;margin-top:5px;font-size:12.5px;color:#3a4456;white-space:pre-line}
.toggle{position:relative;width:40px;height:23px;flex-shrink:0}
.toggle input{display:none}
.toggle .tk{position:absolute;inset:0;background:#cbd5e1;border-radius:30px;transition:.2s}
.toggle .tk:before{content:"";position:absolute;width:17px;height:17px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s}
.toggle input:checked + .tk{background:var(--brand)}
.toggle input:checked + .tk:before{transform:translateX(17px)}
.pill-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.cal-day{font-weight:700;font-size:13px;color:var(--brand-dark);padding:9px 17px;background:#fafbfd;border-bottom:1px solid var(--line)}
hr.sep{border:none;border-top:1px solid var(--line);margin:15px 0}
.bar{background:#eef1f5;height:9px;border-radius:6px;overflow:hidden;margin:5px 0}
.bar > div{height:100%;background:var(--brand)}
.tabs{display:flex;gap:5px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
.tabs button{background:none;border:none;padding:9px 14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;font-size:13.5px}
.tabs button.active{color:var(--brand);border-bottom-color:var(--brand)}
.timeline{position:relative;padding-left:22px}
.timeline:before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:0 0 16px 0}
.tl-item:before{content:"";position:absolute;left:-20px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--brand);border:2px solid #fff;box-shadow:0 0 0 2px var(--brand-soft)}
.tl-item .dt{font-size:11.5px;color:var(--muted);font-weight:600}
.mini-bars{display:flex;align-items:flex-end;gap:9px;height:140px;padding-top:10px}
.mini-bars .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.mini-bars .col .b{width:100%;max-width:38px;background:linear-gradient(180deg,#3b82f6,#1d4ed8);border-radius:5px 5px 0 0}
.mini-bars .col small{font-size:11px;color:var(--muted)}
.kpi-mini{display:flex;gap:18px;flex-wrap:wrap}
.kpi-mini div b{display:block;font-size:19px}.kpi-mini div span{color:var(--muted);font-size:12px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px}
.tmpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.soap-h{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.3px;padding:3px 11px;border-radius:12px;margin:8px 0 9px}
.soap-h.s{background:#dbeafe;color:#1d4ed8}.soap-h.o{background:#ccfbf1;color:#0f766e}.soap-h.a{background:#ede9fe;color:#6d28d9}.soap-h.p{background:#fef3c7;color:#b45309}
@media(max-width:1000px){.cards{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
.hamburger{display:none;background:none;border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:18px;line-height:1;color:var(--ink)}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55}
.backdrop.show{display:block}
@media(max-width:780px){
 .sidebar{transform:translateX(-100%);transition:transform .25s ease;z-index:60;box-shadow:0 0 40px rgba(0,0,0,.45)}
 .sidebar.open{transform:translateX(0)}
 .main{margin-left:0}
 .hamburger{display:inline-flex}
 .topbar{padding:8px 12px;min-height:52px}
 .topbar h2{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42vw}
 .topbar .sub{display:none}
 .topbar .right{gap:5px;flex-shrink:0}
 .topbar .right .btn.sm{padding:6px 9px;font-size:12px;min-height:34px}
 #branchSel{display:none}
 .userchip{gap:0}
 .uc-text{display:none}
 .content{padding:10px}
 /* Cards — single column on mobile */
 .cards{grid-template-columns:1fr 1fr!important;gap:9px}
 .stat{padding:12px}
 .stat .val{font-size:20px}
 .stat .lbl{font-size:11px}
 /* All 2/3 col grids collapse to 1 */
 .grid2,.grid3,.two-col{grid-template-columns:1fr!important}
 /* Tables — scrollable */
 .panel-b.flush{overflow-x:auto;-webkit-overflow-scrolling:touch}
 .panel-b.flush table{min-width:600px}
 /* Hide less important table columns on mobile */
 th:nth-child(3),td:nth-child(3){display:none}
 /* Panel headers wrap nicely */
 .panel-h{padding:11px 13px;gap:7px}
 .panel-h h3{font-size:14px}
 .panel-h .tools{gap:5px}
 .panel-b{padding:12px}
 /* Modals full screen */
 .modal,.modal.wide{max-width:100%;border-radius:12px 12px 0 0;position:fixed;bottom:0;left:0;right:0;margin:0;max-height:92vh;display:flex;flex-direction:column}
 .overlay{padding:0;align-items:flex-end}
 .modal-b{padding:14px;overflow-y:auto;flex:1 1 auto}
 .modal-f{padding:12px 14px;flex-shrink:0}
 /* Buttons smaller */
 .btn{padding:8px 12px;font-size:13px}
 .btn.sm{padding:5px 9px;font-size:11.5px}
 /* Branch selector */
 #branchSel{max-width:38vw;font-size:12px}
 /* Reminder templates — single col */
 .panel-b [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
 /* Treatment cards */
 .pill-row{gap:5px}
 .tag{font-size:11px;padding:2px 7px}
 /* Patient cells */
 .pcell .nm{font-size:13px}
 /* Active bar chips scroll */
 .abar-chips{gap:6px}
 .achip{padding:5px 8px;font-size:12px}
 /* Search bar full width */
 .search{width:100%}
 /* KPI mini wrap */
 .kpi-mini{gap:12px}
 .kpi-mini div b{font-size:16px}
 /* Tabs scroll */
 .tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:1px}
 .tabs button{white-space:nowrap;padding:8px 11px;font-size:13px}
 /* Template grid single col */
 .tmpl-grid{grid-template-columns:1fr!important}
 /* Stats single col on very small screens */
 @media(max-width:400px){.cards{grid-template-columns:1fr!important}}
}
@media(max-width:520px){
 .cards{grid-template-columns:1fr!important}
 .topbar h2{font-size:14px;max-width:38vw}
 .topbar .right .btn.sm{padding:5px 8px;font-size:11px}
 .avatar{width:28px;height:28px;font-size:11px}
}
@media print{
  body > *:not(#print-only-sheet){display:none!important}
  #print-only-sheet{position:fixed!important;inset:0!important;display:block!important;z-index:99999!important}
  @page{margin:0;size:A4 portrait}
}

/* ── Assessment module ── */
.asmt-wrap{max-width:860px;margin:0 auto;padding-bottom:40px}
.asmt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.asmt-header h3{font-size:16px;font-weight:700}
.save-pill{font-size:12px;padding:4px 11px;border-radius:20px;background:#f3f4f6;color:var(--muted);border:1px solid var(--line);transition:.2s}
.save-pill.saving{background:#fef3c7;color:#b45309;border-color:#fde68a}
.save-pill.saved{background:#dcfce7;color:#15803d;border-color:#bbf7d0}
.asec{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
.asec-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:#f8fafc;cursor:pointer;user-select:none;border:none;width:100%;text-align:left}
.asec-head:hover{background:#f1f5f9}
.asec-head h4{font-size:13.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
.asec-head .snum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--brand);color:#fff;border-radius:50%;font-size:11px;font-weight:700;flex-shrink:0}
.asec-chev{font-size:11px;color:var(--muted);transition:transform .18s}
.asec.open .asec-chev{transform:rotate(180deg)}
.asec-body{padding:16px;display:none}
.asec.open .asec-body{display:block}
.afield{margin-bottom:12px}
.afield:last-child{margin-bottom:0}
.afield label{display:block;font-size:11.5px;font-weight:700;color:#5a6680;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.afield input,.afield select,.afield textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;outline:none;font-size:13.5px;font-family:inherit}
.afield input:focus,.afield select:focus,.afield textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.afield textarea{resize:vertical;min-height:60px}
.afield input[readonly]{background:#f8fafc;color:var(--muted)}
.agrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.agrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.agrid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pain-row-a{display:flex;align-items:center;gap:0}
.pain-row-a button{width:36px;height:36px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:600;color:var(--muted);border-right:none}
.pain-row-a button:first-child{border-radius:8px 0 0 8px}
.pain-row-a button:last-child{border-right:1px solid var(--line);border-radius:0 8px 8px 0}
.pain-row-a button.psel{background:var(--brand);color:#fff;border-color:var(--brand)}
.pain-row-a button.psel-0{background:#15803d;color:#fff;border-color:#15803d}
.pain-row-a button.psel-1,.pain-row-a button.psel-2,.pain-row-a button.psel-3{background:#16a34a;color:#fff;border-color:#16a34a}
.pain-row-a button.psel-4,.pain-row-a button.psel-5,.pain-row-a button.psel-6{background:#d97706;color:#fff;border-color:#d97706}
.pain-row-a button.psel-7,.pain-row-a button.psel-8,.pain-row-a button.psel-9{background:#dc2626;color:#fff;border-color:#dc2626}
.pain-row-a button.psel-10{background:#7f1d1d;color:#fff;border-color:#7f1d1d}
.rchips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.rchip-wrap-a{display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.rchip-a{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--line);border-radius:20px;background:#fff;font-size:13px;font-weight:500;cursor:pointer;user-select:none}
.rchip-a:hover{border-color:var(--brand);color:var(--brand)}
.rchip-a.ractive{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-dark);font-weight:700}
.rsides-a{display:flex;gap:3px;padding-left:4px}
.rside-a{width:34px;height:24px;border:1px solid var(--line);background:#fff;border-radius:5px;font-size:11.5px;font-weight:700;color:var(--muted);cursor:pointer}
.rside-a:hover{border-color:var(--brand);color:var(--brand)}
.rside-a.rsa-active{background:var(--brand);color:#fff;border-color:var(--brand)}
.rside-tag{font-size:11px;font-weight:700;color:#fff;background:var(--brand);padding:2px 8px;border-radius:20px}
.aregion-block{margin-bottom:20px}
.aregion-label{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--brand-dark);padding:5px 10px;background:var(--brand-soft);border-left:3px solid var(--brand);border-radius:0 6px 6px 0;margin-bottom:10px;display:inline-block}
.subsec-lbl{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--line)}
.obs-grid-a{display:flex;flex-wrap:wrap;gap:7px}
.obs-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;font-size:12.5px}
.obs-chip:hover{border-color:var(--brand);background:var(--brand-soft)}

/* ── IndexedDB auto-backup ────────────────────────────────────────────────── */
const IDB_NAME="physioverse_backup",IDB_STORE="snapshots",IDB_MAX=7;
let _idb=null;
function idbOpen(){return new Promise((ok,err)=>{if(_idb)return ok(_idb);const r=indexedDB.open(IDB_NAME,1);r.onupgradeneeded=e=>{e.target.result.createObjectStore(IDB_STORE,{keyPath:"ts"});};r.onsuccess=e=>{_idb=e.target.result;ok(_idb);};r.onerror=e=>err(e);});}
function idbSnap(){
  idbOpen().then(db=>{
    const snap={ts:Date.now(),label:new Date().toLocaleString("en-IN"),data:JSON.stringify(DB)};
    const tx=db.transaction(IDB_STORE,"readwrite");const st=tx.objectStore(IDB_STORE);
    st.add(snap);
    // prune: keep only last IDB_MAX
    const cr=st.openCursor(null,"prev");let skip=0;
    cr.onsuccess=e=>{const c=e.target.result;if(!c)return;if(skip++<IDB_MAX)c.continue();else{c.delete();c.continue();}};
  }).catch(()=>{});
}
function idbList(){return idbOpen().then(db=>new Promise((ok,err)=>{const tx=db.transaction(IDB_STORE,"readonly");const st=tx.objectStore(IDB_STORE);const all=st.getAll();all.onsuccess=e=>ok(e.target.result.reverse());all.onerror=err;}));}
function idbRestore(ts){idbOpen().then(db=>new Promise((ok,err)=>{const tx=db.transaction(IDB_STORE,"readonly");const req=tx.objectStore(IDB_STORE).get(ts);req.onsuccess=e=>ok(e.target.result);req.onerror=err;})).then(snap=>{if(!snap)return;if(!confirm("Restore backup from "+snap.label+"? Current data will be replaced.")){return;}DB=JSON.parse(snap.data);save();fillBranches();render();alert("Restored! ✅");});}
function showBackups(){
  idbList().then(snaps=>{
    if(!snaps.length){alert("No automatic backups found yet.");return;}
    const rows=snaps.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)"><span style="font-size:13px">${s.label}</span><button class="btn sm sec" onclick="idbRestore(${s.ts});closeModal()">Restore</button></div>`).join("");
    openModal(`<div class="modal-h"><h3>Auto-backups (last ${snaps.length})</h3><button class="x" onclick="closeModal()">×</button></div><div class="modal-b">${rows}<div class="muted" style="font-size:12px;margin-top:10px">Snapshots are saved automatically inside this browser every time data changes. Maximum ${IDB_MAX} kept.</div></div><div class="modal-f"><button class="btn sec" onclick="closeModal()">Close</button></div>`,true);
  });}
// 7-day download nudge
(function(){const K="pm_last_dl";const last=+localStorage.getItem(K)||0;const days=(Date.now()-last)/(864e5);if(last&&days>7){setTimeout(()=>{const b=document.createElement("div");b.id="backup_nudge";b.style.cssText="position:fixed;bottom:18px;right:18px;z-index:9999;background:#1a1a2e;color:#fff;border-radius:12px;padding:12px 16px;max-width:300px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,0.3)";b.innerHTML=`<b>📥 Backup reminder</b><div style="margin:6px 0 10px;color:#ccc">It's been ${Math.floor(days)} days since your last data backup.</div><div style="display:flex;gap:8px"><button class="btn sm" onclick="exportDB();localStorage.setItem('${K}',Date.now());document.getElementById('backup_nudge').remove()">Download now</button><button class="btn sm sec" style="background:transparent;color:#ccc;border:1px solid #555" onclick="document.getElementById('backup_nudge').remove()">Later</button></div>`;document.body.appendChild(b);},2000);}})();
function exportDB(){const b=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="PhysioMind_backup_"+todayISO+".json";a.click();localStorage.setItem("pm_last_dl",Date.now());}
function importDB(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.patients||!d.plans){alert("Invalid backup file");return;}DB=d;save();fillBranches();render();alert("Data imported successfully ✅");}catch{alert("Could not read file");}};r.readAsText(f);}

function ageFromDob(dob){if(!dob)return"";const b=new Date(dob),n=new Date(todayISO);let a=n.getFullYear()-b.getFullYear();if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate()))a--;return a;}

const inr=n=>"₹"+(+n).toLocaleString("en-IN");
const MM=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function invTotals(inv){const sub=inv.items.reduce((s,i)=>s+i.qty*i.rate,0);const gst=Math.round(sub*inv.gst)/100;return{sub,gst,total:sub+gst};}
function nextInvNo(){let max=40;DB.invoices.forEach(i=>{const m=(i.id||"").match(/(\d+)$/);if(m)max=Math.max(max,+m[1]);});return "INV-2026-"+String(max+1).padStart(3,"0");}
function painTrendSVG(visits){
 const v=(visits||[]).filter(s=>s.pain!==""&&s.pain!=null&&!isNaN(+s.pain)).slice().sort((a,b)=>(a.date+("0"+a.n).slice(-2)).localeCompare(b.date+("0"+b.n).slice(-2)));
 if(v.length<2)return '<div class="muted" style="font-size:12.5px;padding:4px 0">📈 Pain trend appears after 2+ logged sessions.</div>';
 const W=440,H=140,padL=24,padT=12,padB=22,n=v.length;
 const xs=i=>padL+(n===1?0:i*(W-padL-12)/(n-1));
 const ys=p=>padT+(10-p)*(H-padT-padB)/10;
 const pts=v.map((s,i)=>[xs(i),ys(+s.pain)]);
 const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
 const col=p=>+p<=3?"#16a34a":+p<=6?"#d97706":"#dc2626";
 const first=+v[0].pain,last=+v[n-1].pain,arrow=last<first?"▼":last>first?"▲":"→";
 return `<div style="display:flex;justify-content:space-between;align-items:center"><b class="muted">Pain trend (VAS 0–10)</b><span class="tag ${last<=first?'green':'red'}">${first} ${arrow} ${last} / 10</span></div>
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;margin:4px 0 2px">
   ${[0,5,10].map(g=>`<line x1="${padL}" y1="${ys(g)}" x2="${W-6}" y2="${ys(g)}" stroke="#e6e9f0" stroke-width="1"/><text x="2" y="${ys(g)+3}" font-size="9" fill="#6b7589">${g}</text>`).join("")}
   <path d="${line}" fill="none" stroke="#2563eb" stroke-width="2.5"/>
   ${pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="${col(v[i].pain)}"/><text x="${p[0]}" y="${p[1]-7}" font-size="10" fill="#1a2233" text-anchor="middle">${v[i].pain}</text><text x="${p[0]}" y="${H-6}" font-size="9" fill="#6b7589" text-anchor="middle">#${v[i].n}</text>`).join("")}
  </svg>`;}

   ?'<button class="btn sm sec" style="color:var(--danger);border-color:var(--danger)" title="Deactivate" onclick="event.stopPropagation();togglePatientStatus(\''+p.id+'\')">Deactivate</button>'

   +'<td>'+p.age+'/'+p.gender+'</td>'

   +'<td>'+p.condition+'</td>'
   +'<td><span class="tag '+(isActive?'green':'gray')+'">'+( isActive?'Active':'Inactive')+'</span></td>'
   +'<td style="text-align:right;white-space:nowrap">'
   +'<button class="btn sm sec" title="Assessment" onclick="event.stopPropagation();patientView(\''+p.id+'\',\'assess\')">📋</button> '
   +'<button class="btn sm sec" title="Treatment" onclick="event.stopPropagation();patientView(\''+p.id+'\',\'treat\')">🩺</button> '
   +'<button class="btn sm sec" title="Bill" onclick="event.stopPropagation();patientView(\''+p.id+'\',\'bill\')">🧾</button> '
   +'<button class="btn ghost" title="Edit" onclick="event.stopPropagation();patientForm(\''+p.id+'\')">✏️</button> '

  let msg=`Hi ${first} 👋\n\nHere are your home exercises from *${DB.settings.clinic}*:\n\n`;

}

views.treatment=function(){

 // Group plans by patient
 var pidsSeen=[],groups=[];
 plans.forEach(function(t){if(!pidsSeen.includes(t.pid)){pidsSeen.push(t.pid);groups.push({pid:t.pid,plans:[]});}groups.find(function(g){return g.pid===t.pid;}).plans.push(t);});

 groups.forEach(function(g){
  var p=pById(g.pid);
  var isOpen=!!_treatOpen[g.pid];
  var totalSessions=g.plans.reduce(function(s,t){return s+t.sessions;},0);
  var doneSessions=g.plans.reduce(function(s,t){return s+t.done;},0);
  var pct=totalSessions>0?Math.round(doneSessions/totalSessions*100):0;
  var isActiveNow=(DB.active||[]).includes(g.pid);
  var firstPlanId=g.plans.length?g.plans[0].id:'';
  var ongoingBtn=isActiveNow
   ?'<button class="btn sm sec" style="font-size:11px;padding:3px 10px;color:var(--ok);border-color:var(--ok)" onclick="event.stopPropagation();endSession(\''+g.pid+'\');render()">🟢 End</button>'
    +'<button class="btn sm" style="font-size:11px;padding:3px 10px;background:var(--accent)" onclick="event.stopPropagation();endSession(\''+g.pid+'\');sessionForm(\''+firstPlanId+'\')">💳 End & Pay</button>'
   :'<button class="btn sm" style="font-size:11px;padding:3px 10px;background:var(--teal)" onclick="event.stopPropagation();startSession(\''+g.pid+'\');render()">▶ Ongoing Treatment</button>';
  html+='<div class="list-row" style="padding:0;border-bottom:1px solid var(--line)">';

  html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;gap:10px" onclick="_treatOpen[\''+g.pid+'\']=!_treatOpen[\''+g.pid+'\'];this.closest(\'.list-row\').querySelector(\'.treat-body\').style.display=(_treatOpen[\''+g.pid+'\']?\'block\':\'none\');this.querySelector(\'.treat-arrow\').textContent=(_treatOpen[\''+g.pid+'\']+\'\')===\'true\'?\'▾\':\'▸\'">'

   +ongoingBtn
   +'<span class="tag teal">'+doneSessions+'/'+totalSessions+' sessions</span>'

function saveSession(planId,sid,n){const v=k=>{const el=document.getElementById(k);return el?el.value:""};const t=DB.plans.find(x=>x.id===planId);t.visits=t.visits||[];

 if(sid){const i=t.visits.findIndex(x=>x.id===sid);t.visits[i]=rec;}
 else{t.visits.push(rec);t.done=(t.done||0)+1;

 </div>
 <div class="modal-f"><button class="btn sec" onclick="closeModal()">Cancel</button><button class="btn" onclick="savePlan('${id||''}')">Save</button></div>`,true);
 fillEx('p_region','p_exsel');fillEx('h_region','h_exsel');}
function savePlan(id){const v=k=>document.getElementById(k).value;
 const mods=v("t_mod").split("\n").filter(x=>x.trim());
 const obj={pid:v("t_pid"),diagnosis:v("t_dx"),goal:v("t_goal"),sessions:+v("t_sess"),done:+v("t_done"),
   modalities:mods,exercises:v("t_ex").split("\n").filter(x=>x.trim()),home:v("t_home").split("\n").filter(x=>x.trim()),homeFreq:v("t_homefreq"),homeLinks:(window._hl||[]).filter(l=>l.name||l.link),notes:v("t_notes")};
 if(id){
  Object.assign(DB.plans.find(x=>x.id===id),obj);
  const prog=document.getElementById("t_progress")?document.getElementById("t_progress").value.trim():"";
  const pain=document.getElementById("t_pain")?document.getElementById("t_pain").value:"";
  if(prog||pain){
   if(!DB.visitNotes)DB.visitNotes=[];
   DB.visitNotes.push({id:uid("vn"),planId:id,pid:obj.pid,date:new Date().toISOString().slice(0,10),pain:pain,note:prog,by:ROLES[CURROLE].name});
  }
 }else{DB.plans.push({id:uid("t"),...obj});}save();closeModal();render();}

views.packages=()=>`
 <div class="panel"><div class="panel-h"><h3>Package Templates</h3><button class="btn sm sec" onclick="alert('Demo: add custom package template')">+ Template</button></div>
 <div class="panel-b flush"><table><thead><tr><th>Package</th><th>Sessions</th><th>Price</th><th>Validity</th><th>Per session</th></tr></thead><tbody>
 ${DB.pkgTemplates.map(k=>`<tr><td><b>${k.name}</b></td><td>${k.sessions}</td><td>${inr(k.price)}</td><td>${k.validity} days</td><td class="muted">${inr(Math.round(k.price/k.sessions))}</td></tr>`).join("")}
 </tbody></table></div></div>
 <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;align-items:start">
  <div class="panel" style="margin-bottom:0"><div class="panel-h"><h3>Patient Packages</h3><button class="btn sm" onclick="assignPkg()">+ Assign</button></div>

function pkgListHTML(){
 var pkgs=DB.patientPkgs.filter(function(x){return inBranch(pById(x.pid));});
 if(!pkgs.length)return'<div class="empty">No packages assigned</div>';
 return pkgs.map(function(k){
  var p=pById(k.pid);var pct=Math.round(k.used/k.total*100);
  var paidAmt=k.paidAmount!=null?k.paidAmount:k.price;var bal=k.price-paidAmt;
  var balBtn=bal>0?'<button class="btn sm" style="font-size:11px;padding:3px 9px" onclick="pkgPayment(\''+p.id+'\')">Pay balance</button>':'';
  return '<div class="list-row" style="padding:11px 14px">'
   +'<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">'
   +'<div class="pcell" style="min-width:0"><div class="avatar" style="flex-shrink:0">'+initials(p.name)+'</div>'
   +'<div style="min-width:0"><div class="nm">'+p.name+'</div>'
   +'<div class="mt muted" style="font-size:11.5px">'+k.pkg+'</div></div></div>'
   +'<span class="tag '+statusTag(k.status)+'" style="flex-shrink:0">'+k.status+'</span></div>'
   +'<div style="margin:7px 0 4px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">'
   +'<span class="muted">'+k.used+'/'+k.total+' sessions</span><span class="muted">'+pct+'%</span></div>'
   +'<div class="bar"><div style="width:'+pct+'%"></div></div></div>'
   +'<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">'
   +'<span style="font-size:12px;color:'+(bal>0?'var(--danger)':'var(--ok)')+'"><b>'+inr(paidAmt)+'</b>'
   +'<span class="muted"> / '+inr(k.price)+'</span>'+(bal>0?' &bull; <b>'+inr(bal)+' due</b>':' ✓')+'</span>'
   +balBtn+'</div>'
   +'<div style="font-size:11.5px;color:var(--muted);margin-top:3px">Expires '+fmtDate(k.expires)+'</div>'
  +'</div>';
 }).join("");
}
function walletListHTML(){
 var pts=DB.patients.filter(inBranch).filter(function(p){return !MYTHER||p.therapist===MYTHER;}).filter(function(p){return (p.wallet||0)>0;});
 if(!pts.length)return'<div class="empty" style="padding:20px">No wallet balances<br><span class="muted" style="font-size:12px">Top up a patient to add advance funds</span></div>';
 return pts.sort(function(a,b){return (b.wallet||0)-(a.wallet||0);}).map(function(p){
  return '<div class="list-row" style="padding:11px 0">'
   +'<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">'
   +'<div class="pcell"><div class="avatar">'+initials(p.name)+'</div>'
   +'<div><div class="nm">'+p.name+'</div><div class="mt muted" style="font-size:11.5px">'+p.therapist+'</div></div></div>'
   +'<div style="text-align:right;flex-shrink:0">'
   +'<div style="font-size:17px;font-weight:800;color:var(--teal)">'+inr(p.wallet||0)+'</div>'
   +'<div style="display:flex;gap:5px;margin-top:4px;justify-content:flex-end">'
   +'<button class="btn sm sec" style="font-size:11px;padding:3px 8px" onclick="walletFormPid(\''+p.id+'\')">+ Top up</button>'
   +'<button class="btn sm sec" style="font-size:11px;padding:3px 8px" onclick="patientView(\''+p.id+'\',\'bill\')">View</button>'
   +'</div></div></div></div>';
 }).join("");
}
function assignPkg(pid){openModal(`<div class="modal-h"><h3>Assign Package</h3><button class="x" onclick="closeModal()">×</button></div>
 <div class="modal-b">
  <div class="field"><label>Patient</label><select id="k_pid" onchange="updatePkgPrice()">${DB.patients.map(p=>`<option value="${p.id}" ${pid===p.id?'selected':''}>${p.name}</option>`).join("")}</select></div>
  <div class="field"><label>Package</label><select id="k_pkg" onchange="updatePkgPrice()">${DB.pkgTemplates.map(t=>`<option value="${t.id}">${t.name} — ${inr(t.price)}</option>`).join("")}</select></div>
  <hr class="sep" style="margin:10px 0">
  <div style="font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px">Payment at time of assignment</div>
  <div class="grid2">
   <div class="field"><label>Package total (₹)</label><input id="k_total_price" type="number" readonly style="background:#f8fafc;color:var(--muted)"></div>
   <div class="field"><label>Amount paid today (₹)</label><input id="k_paid" type="number" placeholder="Full or partial" oninput="updatePkgBalance()"></div>
  </div>
  <div id="k_balance_row" style="display:none;margin-bottom:10px">
   <div style="background:#fef3c7;border:1px solid #fde68a;border-radius:7px;padding:8px 12px;font-size:12.5px">
    💛 Balance due: <b id="k_balance_val"></b> — sessions are active immediately. Patient pays the rest in installments.
   </div>
  </div>
  <div class="grid2">
   <div class="field"><label>Payment mode</label><select id="k_mode"><option>UPI</option><option>Cash</option><option>Card</option></select></div>
   <div class="field"><label>Start date</label><input id="k_start" type="date" value="${todayISO}"></div>
  </div>
  <div class="field"><label style="display:flex;gap:7px;align-items:center;font-weight:400"><input type="checkbox" id="k_autobook" checked> Auto-schedule all appointments</label></div>
  <div class="grid2"><div class="field"><label>Session time</label><input id="k_time" type="time" value="10:00"></div>
   <div class="field"><label>Sessions / week</label><select id="k_perwk"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option><option>6</option><option>7</option></select></div></div>
  <div class="field"><label>Therapist</label><select id="k_ther">${DB.staff.filter(s=>s.role.includes("Physio")).map(s=>`<option ${MYTHER===s.name?'selected':''}>${s.name}</option>`).join("")}</select></div>
  <div class="muted" style="font-size:12.5px">Sessions are available immediately even if partial payment. Balance tracked in patient ledger.</div>
 </div>
 <div class="modal-f"><button class="btn sec" onclick="closeModal()">Cancel</button><button class="btn" onclick="savePkg()">Assign</button></div>`);
 updatePkgPrice();}
function updatePkgPrice(){const sel=document.getElementById("k_pkg");if(!sel)return;const t=DB.pkgTemplates.find(x=>x.id===sel.value);if(!t)return;const priceEl=document.getElementById("k_total_price");if(priceEl)priceEl.value=t.price;updatePkgBalance();}
function updatePkgBalance(){const totalEl=document.getElementById("k_total_price");const paidEl=document.getElementById("k_paid");if(!totalEl||!paidEl)return;const total=+totalEl.value||0;const paid=+paidEl.value||0;const bal=total-paid;const row=document.getElementById("k_balance_row");const valEl=document.getElementById("k_balance_val");if(row&&valEl){if(paid>0&&paid<total){row.style.display="block";valEl.textContent=inr(bal);}else{row.style.display="none";}}}
function savePkg(){const v=k=>document.getElementById(k);const pid=v("k_pid").value;const t=DB.pkgTemplates.find(x=>x.id===v("k_pkg").value);
 const exp=new Date("2026-06-15");exp.setDate(exp.getDate()+t.validity);const expISO=exp.toISOString().slice(0,10);
 const paidAmt=+v("k_paid").value||t.price;const balance=t.price-paidAmt;
 DB.patientPkgs.push({id:uid("pp"),pid,pkg:t.name,total:t.sessions,used:0,price:t.price,paidAmount:paidAmt,bought:todayISO,expires:expISO,status:"Active"});
 const p=pById(pid);
 // Raise invoice for amount paid today
 if(paidAmt>0){DB.invoices.push({id:nextInvNo(),pid,date:todayISO,items:[{d:t.name+(paidAmt<t.price?" (advance payment)":""),qty:1,rate:paidAmt}],gst:18,status:"Paid",mode:v("k_mode").value,branch:p.branch});}
 // If balance remaining, raise a pending invoice
 if(balance>0){DB.invoices.push({id:nextInvNo(),pid,date:todayISO,items:[{d:t.name+" (balance due)",qty:1,rate:balance}],gst:0,status:"Pending",mode:"—",branch:p.branch});}
 if(v("k_autobook")&&v("k_autobook").checked){const per=+v("k_perwk").value||3;const gap=Math.max(1,Math.round(7/per));let d=v("k_start").value||todayISO;const ther=v("k_ther").value;
   for(let i=0;i<t.sessions;i++){DB.appointments.push({id:uid("a"),pid,date:d,time:v("k_time").value||"10:00",type:"Therapy session",therapist:ther,status:"Pending",branch:p.branch});d=shiftDate(d,gap);}}
 save();closeModal();render();}
// Package balance payment form
function pkgPayment(pid){const pkgs=DB.patientPkgs.filter(k=>k.pid===pid&&k.status==="Active"&&(k.paidAmount||k.price)<k.price);
 if(!pkgs.length){alert("No package balance outstanding for this patient.");return;}
 const opts=pkgs.map(k=>`<option value="${k.id}">${k.pkg} — balance ${inr(k.price-(k.paidAmount||0))}</option>`).join("");
 openModal(`<div class="modal-h"><h3>Package Balance Payment</h3><button class="x" onclick="closeModal()">×</button></div>
 <div class="modal-b">
  <div class="field"><label>Package</label><select id="pp_id">${opts}</select></div>
  <div class="grid2">
   <div class="field"><label>Amount paying now (₹)</label><input id="pp_amt" type="number"></div>
   <div class="field"><label>Mode</label><select id="pp_mode"><option>UPI</option><option>Cash</option><option>Card</option></select></div>
  </div>
 </div>
 <div class="modal-f"><button class="btn sec" onclick="closeModal()">Cancel</button><button class="btn" onclick="savePkgPayment('${pid}')">Save payment</button></div>`);}
function savePkgPayment(pid){const v=k=>document.getElementById(k).value;const ppid=v("pp_id");const k=DB.patientPkgs.find(x=>x.id===ppid);if(!k)return;
 const amt=+v("pp_amt")||0;k.paidAmount=(k.paidAmount||0)+amt;
 const p=pById(pid);
 DB.invoices.push({id:nextInvNo(),pid,date:todayISO,items:[{d:k.pkg+" (installment payment)",qty:1,rate:amt}],gst:0,status:"Paid",mode:v("pp_mode"),branch:p.branch});
 // Mark the pending package balance invoice as paid if now fully paid
 if(k.paidAmount>=k.price){const pendingPkgInv=DB.invoices.find(i=>i.pid===pid&&i.status==="Pending"&&i.items&&i.items[0]&&i.items[0].d.includes("balance due")&&i.items[0].d.includes(k.pkg));if(pendingPkgInv){pendingPkgInv.status="Paid";pendingPkgInv.mode=v("pp_mode");}}
 save();closeModal();render();}

let _invSearch="",_invDate="";
views.billing=()=>{const inv=DB.invoices.filter(inBranch).slice().sort((a,b)=>b.date.localeCompare(a.date)||(b.id>a.id?1:-1));
 const paid=inv.filter(i=>i.status==='Paid').reduce((s,i)=>s+invTotals(i).total,0);
 const pend=inv.filter(i=>i.status==='Pending').reduce((s,i)=>s+invTotals(i).total,0);
 const gst=inv.reduce((s,i)=>s+invTotals(i).gst,0);
 const todayInv=inv.filter(i=>i.date===todayISO&&i.status==='Paid');
 const byMode={};todayInv.forEach(i=>{byMode[i.mode]=(byMode[i.mode]||0)+invTotals(i).total;});
 const collToday=todayInv.reduce((s,i)=>s+invTotals(i).total,0);
 const expToday=DB.expenses.filter(inBranch).filter(e=>e.date===todayISO).reduce((s,e)=>s+e.amount,0);
 const q=_invSearch.toLowerCase().trim();
 const filtered=inv.filter(i=>{const p=pById(i.pid);const nameMatch=!q||p.name.toLowerCase().includes(q)||i.id.toLowerCase().includes(q);const dateMatch=!_invDate||i.date===_invDate;return nameMatch&&dateMatch;});
 return `<div class="cards" style="grid-template-columns:repeat(3,1fr)">
  <div class="stat"><div class="lbl">Collected</div><div class="val" style="color:var(--ok)">${inr(paid)}</div></div>
  <div class="stat"><div class="lbl">Outstanding</div><div class="val" style="color:var(--warn)">${inr(pend)}</div></div>
  <div class="stat"><div class="lbl">GST collected (18%)</div><div class="val">${inr(Math.round(gst))}</div></div>
 </div>
 <div class="panel"><div class="panel-h" style="flex-wrap:wrap;gap:8px"><h3>Invoices</h3>
  <div style="display:flex;gap:6px;flex:1;min-width:0;flex-wrap:wrap">
   <input id="inv_search" placeholder="🔍 Search patient or invoice #" value="${_invSearch}" oninput="_invSearch=this.value;render()" style="flex:1;min-width:140px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px">
   <input id="inv_date" type="date" value="${_invDate}" onchange="_invDate=this.value;render()" style="padding:7px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px">
   ${(_invSearch||_invDate)?`<button class="btn sm sec" onclick="_invSearch='';_invDate='';render()">✕ Clear</button>`:''}
  </div>
  <div class="tools"><button class="btn sm sec" onclick="walletForm()">💳 Wallet top-up</button><button class="btn sm sec" onclick="consultInvForm()">🩺 Consult invoice</button><button class="btn sm" onclick="invForm()">+ Session invoice</button></div>
 </div>
 <div class="panel-b flush"><table><thead><tr><th>Invoice #</th><th>Patient</th><th>Date</th><th>Amount</th><th>Mode</th><th>Status</th><th></th></tr></thead><tbody>
 ${filtered.length?filtered.map(i=>{const p=pById(i.pid);return `<tr class="clk" onclick="viewInvoice('${i.id}')"><td><b>${i.id}</b></td><td>${p.name}</td><td>${fmtDate(i.date)}</td><td><b>${inr(invTotals(i).total)}</b></td><td>${i.mode}</td><td><span class="tag ${statusTag(i.status)}">${i.status}</span></td><td style="text-align:right">${i.status==='Pending'?`<button class="btn sm" onclick="event.stopPropagation();markPaid('${i.id}')">Mark paid</button> <button class="btn sm sec" onclick="event.stopPropagation();payRemind('${i.id}')">🔔</button>`:'<span class="muted">✓</span>'}</td></tr>`;}).join(""):'<tr><td colspan=7 class="empty">No invoices match your search</td></tr>'}
 </tbody></table></div></div>
 <div class="panel"><div class="panel-h"><h3>Day close — ${fmtDate(todayISO)}</h3><button class="btn sm sec" onclick="alert('Demo: day-close report generated, saved & emailed to owner')">Close day & report</button></div><div class="panel-b">
  <div class="kpi-mini" style="gap:24px">${['Cash','UPI','Card','Wallet','Package','Corporate'].map(m=>`<div><b>${inr(byMode[m]||0)}</b><span>${m}</span></div>`).join("")}</div>

 </div></div>`;};

function consultInvForm(pid){openModal(`<div class="modal-h"><h3>Consultation Invoice</h3><button class="x" onclick="closeModal()">×</button></div>
 <div class="modal-b">

function invAddLine(){
 const pick=document.getElementById("i_svc_pick");
 const rate=+pick.value;
 const desc=rate===0?"":(pick.options[pick.selectedIndex].text.split(" — ")[0]);
 const box=document.getElementById("i_lines");
 const idx=box.children.length;
 const row=document.createElement("div");
 row.style.cssText="display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid var(--line);background:#fff";
 row.innerHTML=`<input class="inv-d" placeholder="Description" value="${desc}" style="flex:2;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px" oninput="invCalc()">
  <input class="inv-r" type="number" placeholder="₹ Rate" value="${rate||''}" style="width:90px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px;text-align:right" oninput="invCalc()">
  <input class="inv-q" type="number" placeholder="Qty" value="1" min="1" style="width:55px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px;text-align:center" oninput="invCalc()">
  <button type="button" onclick="this.closest('div').remove();invCalc()" style="background:none;border:none;color:var(--danger);font-size:17px;cursor:pointer;padding:0 4px">✕</button>`;
 box.appendChild(row);
 invCalc();}
function invCalc(){
 const rows=document.querySelectorAll("#i_lines > div");
 let sub=0;
 rows.forEach(r=>{const rate=+(r.querySelector(".inv-r").value)||0;const qty=+(r.querySelector(".inv-q").value)||1;sub+=rate*qty;});
 document.getElementById("i_sub").textContent=inr(sub);
 document.getElementById("i_tot").textContent=inr(Math.round(sub*1.18));}
function saveInv(){
 const mode=document.getElementById("i_mode").value;
 const pid=document.getElementById("i_pid").value;
 const p=pById(pid);
 const rows=[...document.querySelectorAll("#i_lines > div")];
 if(!rows.length){alert("Add at least one service.");return;}
 const items=rows.map(r=>({d:r.querySelector(".inv-d").value||"Service",qty:+(r.querySelector(".inv-q").value)||1,rate:+(r.querySelector(".inv-r").value)||0}));
 const subtotal=items.reduce((s,i)=>s+i.rate*i.qty,0);
 const gross=Math.round(subtotal*1.18);
 let inv={id:nextInvNo(),pid,date:todayISO,items,gst:18,branch:p.branch};
 if(mode==="Package session"){const pk=DB.patientPkgs.find(k=>k.pid===pid&&k.status==="Active"&&k.used<k.total);if(!pk){alert("No active package with sessions left for this patient.");return;}pk.used++;inv.items=items.map(i=>({...i,d:i.d+" (package)",rate:0}));inv.status="Paid";inv.mode="Package";}
 else if(mode==="Wallet"){if((p.wallet||0)<gross){alert("Insufficient wallet balance ("+inr(p.wallet||0)+"). Top up first.");return;}p.wallet-=gross;inv.status="Paid";inv.mode="Wallet";}
 else if(mode==="Pending"){inv.status="Pending";inv.mode="—";}
 else{inv.status="Paid";inv.mode=mode;}
 DB.invoices.push(inv);save();closeModal();render();}

function apptMsg(p,when){return `Namaste ${p.name.split(" ")[0]} ji 🙏\nReminder: Your physiotherapy appointment at ${DB.settings.clinic} is on ${when}.\nReply 1 to confirm, 2 to reschedule.\n— Team ${DB.settings.clinic}, Indore`;}
function payMsg(p,txt){return `Namaste ${p.name.split(" ")[0]} ji 🙏\nGentle reminder from ${DB.settings.clinic}: ${txt}.\nYou can pay via UPI or at reception. Thank you!`;}
function waLink(phone,text){return "https://wa.me/"+(phone||"").replace(/\D/g,"")+"?text="+encodeURIComponent(text);}
function sendWA(pid,kind,when,text){const p=pById(pid);try{window.open(waLink(p.phone,text),"_blank");}catch(e){}
 DB.reminders.unshift({id:uid("r"),pid,channel:"WhatsApp",kind,when:"Sent "+fmtDate(todayISO),appt:when,status:"Sent"});save();render();}
function copyTemplate(i){const el=document.getElementById("tmpl_"+i);if(!el)return;navigator.clipboard.writeText(el.innerText).then(function(){const btn=el.nextElementSibling.querySelector("button");const orig=btn.textContent;btn.textContent="✓ Copied!";setTimeout(function(){btn.textContent=orig;},1800);});}
function sendTemplateWA(i){const el=document.getElementById("tmpl_"+i);if(!el)return;const msg=el.innerText;window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");}

// aInitView now initialises the modal form after it's opened
function aInitView(formAst){
  const a=formAst;
  // Pain row
  const pr=document.getElementById("apainRow");
  if(pr&&!pr.children.length){for(let i=0;i<=10;i++){const b=document.createElement("button");b.textContent=i;b.onclick=()=>{a.painScore=i;aUpdatePainFor(a);};pr.appendChild(b);}}
  aUpdatePainFor(a);
  aBuildRegionsFor(a);
  aBuildFuncFor(a);
  aRenderDynamicFor(a);
  (a.func||[]).forEach(i=>{const el=document.getElementById("afunc-"+i);if(el){el.classList.add("fon");const cb=el.querySelector("input");if(cb)cb.checked=true;}});
}

function aToggle(id){document.getElementById(id).classList.toggle("open");}

// ── Per-form-ast helpers (all functions now take the form's working object) ──

function aUpdatePainFor(a){
  document.querySelectorAll("#apainRow button").forEach((b,i)=>{
    b.className=i===a.painScore?"psel psel-"+i:"";
  });
}

function aBuildRegionsFor(a){
  const c=document.getElementById("aregChips");if(!c)return;c.innerHTML="";
  AREGIONS.forEach(r=>{
    const rk=r.replace("/","_");
    const wrap=document.createElement("div");wrap.className="rchip-wrap-a";
    wrap.innerHTML=`<div class="rchip-a${a.regions.includes(r)?" ractive":""}" id="arch-${rk}" onclick="aToggleRegion('${r}')"><span>✓</span> ${r}</div>
      <div class="rsides-a" id="arsides-${rk}" style="${a.regions.includes(r)?"":"display:none"}">
        <button class="rside-a${a.regionSides[r]==='L'?" rsa-active":""}" onclick="aSetSide('${r}','L')">L</button>
        <button class="rside-a${a.regionSides[r]==='R'?" rsa-active":""}" onclick="aSetSide('${r}','R')">R</button>
        <button class="rside-a${a.regionSides[r]==='B'?" rsa-active":""}" onclick="aSetSide('${r}','B')">B/L</button>
      </div>`;
    c.appendChild(wrap);
  });
  aUpdateRegChips();
}

function aBuildFuncFor(a){
  const g=document.getElementById("afuncGrid");if(!g)return;g.innerHTML="";
  AFUNCTIONAL.forEach((f,i)=>{
    const el=document.createElement("label");el.className="fchip"+(a.func.includes(i)?" fon":"");el.id="afunc-"+i;
    el.innerHTML=`<input type="checkbox" ${a.func.includes(i)?"checked":""} onchange="aFunc(${i},this.checked)"> ${f}`;
    g.appendChild(el);
  });
}

function aRenderDynamicFor(a){aRenderObs();aRenderROM();aRenderMMT();aRenderTests();}

// ── All interactive callbacks reference window._aForm (the current working record) ──

function aToggleRegion(r){
  const a=window._aForm;if(!a)return;
  const idx=a.regions.indexOf(r);
  if(idx>-1){a.regions.splice(idx,1);delete a.regionSides[r];}
  else a.regions.push(r);
  aUpdateRegChips();aRenderObs();aRenderROM();aRenderMMT();aRenderTests();
}
function aSetSide(r,s){const a=window._aForm;if(!a)return;a.regionSides[r]=a.regionSides[r]===s?null:s;aUpdateRegChips();aRenderObs();aRenderROM();aRenderMMT();aRenderTests();}
function aUpdateRegChips(){
  const a=window._aForm;if(!a)return;
  AREGIONS.forEach(r=>{
    const rk=r.replace("/","_");
    const ch=document.getElementById("arch-"+rk);const sd=document.getElementById("arsides-"+rk);
    if(!ch)return;
    const on=a.regions.includes(r);
    ch.classList.toggle("ractive",on);
    if(sd)sd.style.display=on?"flex":"none";
    ["L","R","B"].forEach(sv=>{const btn=sd&&sd.children[[...["L","R","B"]].indexOf(sv)];if(btn)btn.classList.toggle("rsa-active",a.regionSides[r]===sv);});

   fillEx('ca_exreg','ca_exsel');fillEx('ca_hreg','ca_hsel');
 },30);
}

function caMode(m){window._caMode=m;window._aForm&&(window._aForm.mode=m);document.getElementById("ca-upload").style.display=m==='upload'?'block':'none';document.getElementById("ca-template").style.display=m==='template'?'block':'none';document.querySelectorAll("#catabs button").forEach(b=>b.classList.toggle("active",b.dataset.m===m));}
function caPreview(inp){const f=inp.files[0];if(!f)return;window._aForm&&(window._aForm.assessFile=f.name);const r=new FileReader();r.onload=e=>{document.getElementById("ca_imgprev").innerHTML='<img src="'+e.target.result+'" style="max-width:100%;max-height:180px;border-radius:8px;border:1px solid var(--line)"><div style="margin-top:4px">📎 '+f.name+'</div>';};r.readAsDataURL(f);}

function saveAssess(){
  if(!DB.assessments)DB.assessments=[];
  const a=window._aForm;if(!a)return;
  const gv=id=>{const el=document.getElementById(id);return el?el.value:"";}
  a.pid=gv("ca_pid")||a.pid;
  a.therapist=gv("ca_ther")||a.therapist;
  a.rx=gv("ca_rx").split("\n").filter(x=>x.trim());
  a.modalities=gv("ca_mods").split("\n").filter(x=>x.trim());
  a.exercises=gv("ca_ex").split("\n").filter(x=>x.trim());
  a.home=gv("ca_home").split("\n").filter(x=>x.trim());
  a.homeFreq=gv("ca_homefreq")||a.homeFreq||"";
  if(gv("ca_sessions"))a.sessions=+gv("ca_sessions");
  if(!a.pid){alert("Select a patient.");return;}
  const idx=DB.assessments.findIndex(x=>x.id===a.id);
  if(idx>-1)DB.assessments[idx]=a; else DB.assessments.push(a);
  save();closeModal();
  // Go straight to the document view
  window._viewAssessId=a.id;
  current="assessment";
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.v==="assessment"));
  document.getElementById("view").innerHTML=assessDocHTML(a.id);
  window.scrollTo(0,0);
  window._aForm=null;
}

function assessView(id){

  document.getElementById("view").innerHTML=assessDocHTML(id);
  window.scrollTo(0,0);
}

function assessDocHTML(id){
  if(!DB.assessments)return'';
  const c=DB.assessments.find(x=>x.id===id);if(!c)return'';
  const p=pById(c.pid);
  const ini=p.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);

  // Pain badge colour
  const pn=c.pain!=null?+c.pain:null;
  const painCls=pn===null?"":(pn<=3?"p-green":pn<=6?"p-amber":pn<=8?"p-red":"p-dark");
  const painHTML=pn!==null?`<span class="adoc-pain ${painCls}">⬤ Pain ${pn}/10</span>`:"";

  // Helper: only render if truthy
  const frow=(lbl,val)=>val?`<div class="adoc-row"><span class="adoc-lbl">${lbl}</span><span class="adoc-val">${val}</span></div>`:"";
  const chips=(arr,cls)=>arr.length?`<div class="adoc-chips">${arr.map(v=>`<span class="adoc-chip ${cls}">${v}</span>`).join("")}</div>`:"";

  // ── S: Subjective ──
  const sRows=[
    frow("Chief complaint",c.complaint),
    frow("Onset / mechanism",c.onset),
    frow("Pain site",c.painsite),
    frow("Aggravating factors",c.aggr),
    frow("Relieving factors",c.reliev),
    frow("History / medications",c.history)
  ].filter(Boolean).join("");

  // ── O: Objective — per region ──
  let regionBlocks="";
  (c.regions||[]).forEach(r=>{
    const rk=r.replace("/","_");
    const side=c.regionSides&&c.regionSides[r];
    const sideTag=side?` <span style="font-size:10px;padding:1px 7px;background:#1d4ed8;color:#fff;border-radius:20px;vertical-align:middle">${side==="B"?"Bilateral":side==="L"?"Left":"Right"}</span>`:"";

    // Observation
    const obsIdxs=c.obs&&c.obs[r]||[];
    const obsNames=(AOBS[r]||[]).filter((_,i)=>obsIdxs.includes(i));
    const obsHTML=obsNames.length?`<div class="adoc-sub-lbl">Observation</div>${chips(obsNames,"obs")}`:"";

    // Palpation — only tender ones
    const palpData=c.palp&&c.palp[r]||{};
    const palpItems=(APALP[r]||[]).map((pt,i)=>{const sv=palpData[i]||{};return sv.tender?`${pt.pt}${sv.side?" ("+sv.side+")":""}${sv.note?" — "+sv.note:""}`:null;}).filter(Boolean);
    const palpHTML=palpItems.length?`<div class="adoc-sub-lbl" style="margin-top:10px">Palpation — tender</div>${chips(palpItems,"tender")}`:"";

    // Neurological
    const ns=c.neuro&&c.neuro[r]||{};
    const neuroSyms=ANEURO_SYMS.filter((_,i)=>ns["s"+i]);
    const neuroExtra=[ns.radTo&&"Radiates → "+ns.radTo, ns.dermatomal&&"Nerve: "+ns.dermatomal, ns.other&&ns.other].filter(Boolean);
    const neuroHTML=(neuroSyms.length||neuroExtra.length)?
      `<div class="adoc-sub-lbl" style="margin-top:10px">Neurological</div>
       ${chips(neuroSyms,"neuro")}
       ${neuroExtra.length?`<div style="font-size:12px;color:var(--muted);margin-top:5px">${neuroExtra.join(" &nbsp;·&nbsp; ")}</div>`:""}`
      :"";

    // ROM — only filled entries
    const romData=c.rom&&c.rom[r]||{};
    const romEntries=(AROM[r]||[]).map(({mv,norm})=>{const s=romData[mv]||{};const active=s.active,passive=s.passive;if(!active&&!passive)return null;const parts=[active&&`A:${active}°`,passive&&`P:${passive}°`].filter(Boolean).join(" / ");return{mv,norm,parts};}).filter(Boolean);
    const romHTML=romEntries.length?`<div class="adoc-sub-lbl" style="margin-top:10px">Range of motion</div>
      <div class="adoc-rom-grid">${romEntries.map(e=>`<div class="adoc-rom-item"><div class="adoc-rom-mv">${e.mv}</div><div class="adoc-rom-val">${e.parts} <span class="adoc-rom-norm">/ ${e.norm}</span></div></div>`).join("")}</div>`:"";

    // MMT — only graded muscles
    const mmtData=c.mmt&&c.mmt[r]||{};
    const mmtItems=(AMMT[r]||[]).map(m=>{const g=mmtData[m];if(g==null)return null;const note=mmtData[m+"_note"];return`${m} — ${g}/5${note?" ("+note+")":""}`;}).filter(Boolean);
    const mmtHTML=mmtItems.length?`<div class="adoc-sub-lbl" style="margin-top:10px">Manual muscle testing</div>${chips(mmtItems,+mmtItems.find(x=>+x.match(/(\d)\/5/)?.[1]||5)<4?"weak":"")}`:"";

    // Special tests — only positive ones
    const testsData=c.tests&&c.tests[r]||{};
    const posTests=(ATESTS[r]||[]).filter(t=>testsData[t]==="+").map(t=>t+" ✚");
    const negTests=(ATESTS[r]||[]).filter(t=>testsData[t]==="-").map(t=>t);
    const testsHTML=(posTests.length||negTests.length)?
      `<div class="adoc-sub-lbl" style="margin-top:10px">Special tests</div>
       ${posTests.length?chips(posTests,"pos"):""}
       ${negTests.length?`<div style="font-size:11.5px;color:var(--muted);margin-top:4px">Negative: ${negTests.join(", ")}</div>`:""}`
      :"";

    if(obsHTML||palpHTML||neuroHTML||romHTML||mmtHTML||testsHTML){
      regionBlocks+=`<div class="adoc-region-block">
        <div class="adoc-region-lbl">${r}${sideTag}</div>
        ${obsHTML}${palpHTML}${neuroHTML}${romHTML}${mmtHTML}${testsHTML}
      </div>`;
    }
  });

  // General objective
  const genObjRows=[
    frow("Posture",c.posture),
    frow("Gait",c.gait),
    frow("Swelling / deformity",c.swelling),
    frow("Neuro (general)",c.neuroNote)
  ].filter(Boolean).join("");

  // Functional
  const funcNames=(c.func||[]).map(i=>AFUNCTIONAL[i]).filter(Boolean);
  const funcHTML=(funcNames.length||c.funcOther)?
    `<div class="adoc-row"><span class="adoc-lbl">Functional limitations</span><span class="adoc-val">${chips(funcNames,"func")}${c.funcOther?`<div style="margin-top:5px;font-size:12.5px">${c.funcOther}</div>`:""}</span></div>`:"";

  // Objective section body
  const oHasContent=regionBlocks||genObjRows||funcHTML;

  // ── A: Assessment ──
  const aRows=[
    frow("Problem list",c.problem),
    frow("Clinical notes",c.assessment)
  ].filter(Boolean).join("");

  // ── P: Plan ──
  const planCards=[
    c.stg?`<div class="adoc-plan-card"><div class="adoc-plan-lbl">Short-term goals (2–4 wks)</div><div class="adoc-plan-val">${c.stg}</div></div>`:"",
    c.ltg?`<div class="adoc-plan-card"><div class="adoc-plan-lbl">Long-term goals (discharge)</div><div class="adoc-plan-val">${c.ltg}</div></div>`:"",
    c.sessions?`<div class="adoc-plan-card"><div class="adoc-plan-lbl">Total sessions</div><div class="adoc-plan-val">${c.sessions} sessions</div></div>`:"",
    c.freq?`<div class="adoc-plan-card"><div class="adoc-plan-lbl">Frequency</div><div class="adoc-plan-val">${c.freq}</div></div>`:"",
    c.advice?`<div class="adoc-plan-card" style="grid-column:1/-1"><div class="adoc-plan-lbl">General advice / precautions</div><div class="adoc-plan-val">${c.advice}</div></div>`:""
  ].filter(Boolean);

  // Modalities chips
  const modalitiesHTML=(c.modalities||[]).length?`<div class="adoc-row"><span class="adoc-lbl">Modalities</span><span class="adoc-val">${chips(c.modalities,"obs")}</span></div>`:"";

  // Exercises list
  const exHTML=(c.exercises||[]).length?`<div class="adoc-row"><span class="adoc-lbl">Clinic exercises</span><span class="adoc-val"><div class="adoc-rx-list">${(c.exercises||[]).map((e,i)=>`<div class="adoc-rx-item"><span class="adoc-rx-num" style="background:#d1fae5;color:#065f46">${i+1}</span>${e}</div>`).join("")}</div></span></div>`:"";

  // Home programme
  const homeHTML=(c.home||[]).length?`<div class="adoc-row"><span class="adoc-lbl">🏠 Home programme</span><span class="adoc-val"><div class="adoc-rx-list">${(c.home||[]).map((e,i)=>`<div class="adoc-rx-item"><span class="adoc-rx-num" style="background:#fef3c7;color:#92400e">${i+1}</span>${e}</div>`).join("")}</div>${c.homeFreq?`<div style="margin-top:6px;font-size:12px;color:var(--muted)">Frequency: <b>${c.homeFreq}</b></div>`:""}</span></div>`:"";

  const rxHTML=(c.rx||[]).length?`<div class="adoc-row"><span class="adoc-lbl">Prescription (Rx)</span><span class="adoc-val"><div class="adoc-rx-list">${(c.rx||[]).map((r,i)=>`<div class="adoc-rx-item"><span class="adoc-rx-num">${i+1}</span>${r}</div>`).join("")}</div></span></div>`:""

  const hasPlan=planCards.length||modalitiesHTML||exHTML||homeHTML||rxHTML;

  return `<div class="adoc-wrap">
  <button class="adoc-back" onclick="current='assessment';document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.v==='assessment'));document.getElementById('view').innerHTML=views.assessment();window.scrollTo(0,0)">← Back to Assessment list</button>

  <div class="adoc-hdr">
    <div class="adoc-hdr-top">
      <div class="adoc-patient">
        <div class="adoc-av">${ini}</div>
        <div>
          <div class="adoc-name">${p.name}</div>
          <div class="adoc-sub">${[p.age&&p.age+"yrs",p.gender,p.phone,p.occupation].filter(Boolean).join(" · ")}</div>
        </div>
      </div>
      <div class="adoc-btns">
        <button class="btn sec" onclick="assessEdit('${id}')">✏ Edit</button>
        <button class="btn sec" onclick="assessPrint('${id}')">🖨 Print</button>
        <button class="btn sec" onclick="assessSavePDF('${id}')">⬇ Save PDF</button>
        <button class="btn" style="background:#16a34a" onclick="startSessionFromAssess('${id}')">▶ Start Session</button>
      </div>
    </div>
    <div class="adoc-meta">
      <div class="adoc-mi"><b>Date</b>${fmtDate(c.date)}</div>
      <div class="adoc-mi"><b>Patient ID</b>${p.id}</div>
      ${p.dob?`<div class="adoc-mi"><b>DOB</b>${fmtDate(p.dob)}</div>`:''}
      <div class="adoc-mi"><b>Therapist</b>${c.therapist}</div>
      ${c.mode==='upload'?`<div class="adoc-mi"><b>Mode</b><span class="tag amber">Paper scan</span></div>`:`<div class="adoc-mi"><b>Mode</b><span class="tag teal">Digital template</span></div>`}
      ${c.assessFile?`<div class="adoc-mi"><b>Attachment</b>📎 ${c.assessFile}</div>`:""}
      ${painHTML?`<div class="adoc-mi" style="margin-left:auto">${painHTML}</div>`:""}
    </div>
  </div>

  ${sRows?`<div class="adoc-sec">
    <div class="adoc-sec-h"><div class="adoc-sec-ico adoc-ico-s">💬</div><span class="adoc-sec-title">S · Subjective</span><span class="adoc-sec-tag">Patient reported</span></div>
    <div class="adoc-body">${sRows}</div>
  </div>`:""}

  ${oHasContent?`<div class="adoc-sec">
    <div class="adoc-sec-h"><div class="adoc-sec-ico adoc-ico-o">🩺</div><span class="adoc-sec-title">O · Objective</span><span class="adoc-sec-tag">Clinical findings</span></div>
    <div class="adoc-body">
      ${genObjRows}
      ${regionBlocks?`<div style="margin-top:${genObjRows?"12px":"0"}">${regionBlocks}</div>`:""}
      ${funcHTML}
    </div>
  </div>`:""}

  ${(c.dx||aRows)?`<div class="adoc-sec">
    <div class="adoc-sec-h"><div class="adoc-sec-ico adoc-ico-a">📋</div><span class="adoc-sec-title">A · Assessment</span><span class="adoc-sec-tag">Clinical impression</span></div>
    <div class="adoc-body">
      ${c.dx?`<div class="adoc-dx-card"><div class="adoc-dx-lbl">Provisional diagnosis</div><div class="adoc-dx-val">${c.dx}</div></div>`:""}
      ${aRows}
    </div>
  </div>`:""}

  ${hasPlan?`<div class="adoc-sec">
    <div class="adoc-sec-h"><div class="adoc-sec-ico adoc-ico-p">✅</div><span class="adoc-sec-title">P · Plan</span><span class="adoc-sec-tag">Treatment & goals</span></div>
    <div class="adoc-body">
      ${planCards.length?`<div class="adoc-plan-grid">${planCards.join("")}</div>`:""}
      ${modalitiesHTML}
      ${exHTML}
      ${homeHTML}
      ${rxHTML}
      <div class="adoc-sig"><div class="adoc-sig-inner"><div class="adoc-sig-line"></div><div class="adoc-sig-name">${c.therapist}</div><div class="adoc-sig-role">Physiotherapist · ${DB.settings.clinic}</div></div></div>
    </div>
  </div>`:""}

</div>`;
}

// ── Build single-page line-by-line PDF layout ──
function buildPDFHTML(id){
  const c=DB.assessments.find(x=>x.id===id);if(!c)return'';
  const p=pById(c.pid);
  const ini=p.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const pn=c.pain!=null?+c.pain:null;
  const painCls=pn===null?'#94a3b8':(pn<=3?'#16a34a':pn<=6?'#d97706':pn<=8?'#dc2626':'#7f1d1d');

  // helpers
  const chip=(txt,bg,col)=>`<span style="display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:600;background:${bg};color:${col};margin:1px 3px 1px 0;white-space:nowrap">${txt}</span>`;
  const lrow=(lbl,val)=>val?`<tr><td style="padding:3px 8px 3px 0;font-size:9.5px;font-weight:700;color:#64748b;white-space:nowrap;vertical-align:top;width:130px;text-transform:uppercase;letter-spacing:.2px">${lbl}</td><td style="padding:3px 0;font-size:10px;color:#1e293b;line-height:1.5">${val}</td></tr>`:''  ;
  const sec=(ico,lbl,col,content)=>content?`
    <div style="margin-bottom:8px">
      <div style="background:${col};color:#fff;padding:4px 12px;font-size:9.5px;font-weight:700;letter-spacing:.6px;display:flex;align-items:center;gap:6px;border-radius:5px 5px 0 0">${ico} ${lbl}</div>
      <div style="border:1px solid ${col}33;border-top:none;border-radius:0 0 5px 5px;padding:8px 12px;background:#fafbfc">${content}</div>
    </div>`:''  ;

  // ── S · Subjective ──
  const sContent=`<table style="width:100%;border-collapse:collapse">
    ${lrow('Chief complaint',c.complaint)}
    ${lrow('Onset / mechanism',c.onset)}
    ${lrow('Pain site & radiation',c.painsite)}
    ${c.pain!=null?lrow('Pain (NPRS)',`<span style="display:inline-block;padding:1px 10px;border-radius:20px;font-size:9px;font-weight:700;background:${painCls};color:#fff">${c.pain}/10</span>`):''}
    ${lrow('Aggravating factors',c.aggr)}
    ${lrow('Relieving factors',c.reliev)}
    ${lrow('History / medications',c.history)}
  </table>`;

  // ── O · Objective ──
  // General
  const genRows=[lrow('Posture',c.posture),lrow('Gait',c.gait),lrow('Swelling / deformity',c.swelling),lrow('Neuro (general)',c.neuroNote)].filter(Boolean).join('');
  const genTable=genRows?`<table style="width:100%;border-collapse:collapse;margin-bottom:6px">${genRows}</table>`:'';

  // Per-region
  let regLines='';
  (c.regions||[]).forEach(r=>{
    const side=c.regionSides&&c.regionSides[r];
    const obsIdxs=c.obs&&c.obs[r]||[];
    const obsNames=(AOBS[r]||[]).filter((_,i)=>obsIdxs.includes(i));
    const palpData=c.palp&&c.palp[r]||{};
    const palpItems=(APALP[r]||[]).map((pt,i)=>{const sv=palpData[i]||{};return sv.tender?pt.pt+(sv.note?' ('+sv.note+')':''):null;}).filter(Boolean);
    const ns=c.neuro&&c.neuro[r]||{};
    const neuroSyms=ANEURO_SYMS.filter((_,i)=>ns['s'+i]);
    const neuroExtra=[ns.radTo&&'Radiates→'+ns.radTo,ns.dermatomal&&ns.dermatomal].filter(Boolean).join(' · ');
    const romData=c.rom&&c.rom[r]||{};
    const romEntries=(AROM[r]||[]).map(({mv,norm})=>{const s=romData[mv]||{};if(!s.active&&!s.passive)return null;return `${mv} ${[s.active&&'A:'+s.active+'°',s.passive&&'P:'+s.passive+'°'].filter(Boolean).join('/')} <span style="color:#94a3b8">(N:${norm})</span>`;}).filter(Boolean);
    const mmtData=c.mmt&&c.mmt[r]||{};
    const mmtItems=(AMMT[r]||[]).map(m=>{const g=mmtData[m];return g!=null?`${m} — ${g}/5`:null;}).filter(Boolean);
    const testsData=c.tests&&c.tests[r]||{};
    const posTests=(ATESTS[r]||[]).filter(t=>testsData[t]==='+');
    const negTests=(ATESTS[r]||[]).filter(t=>testsData[t]==='-');

    let cells='';
    if(obsNames.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;width:100px;vertical-align:top">Observation</td><td style="padding:2px 0">${obsNames.map(o=>chip(o,'#dcfce7','#166534')).join('')}</td></tr>`;
    if(palpItems.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">Tender</td><td style="padding:2px 0">${palpItems.map(o=>chip(o,'#fef3c7','#92400e')).join('')}</td></tr>`;
    if(neuroSyms.length||neuroExtra) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">Neuro</td><td style="padding:2px 0">${neuroSyms.map(o=>chip(o,'#ede9fe','#6d28d9')).join('')}${neuroExtra?`<span style="font-size:9px;color:#6d28d9;margin-left:4px">${neuroExtra}</span>`:''}</td></tr>`;
    if(romEntries.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">ROM</td><td style="padding:2px 0;font-size:9px;color:#0369a1">${romEntries.join(' &nbsp;|&nbsp; ')}</td></tr>`;
    if(mmtItems.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">MMT</td><td style="padding:2px 0">${mmtItems.map(o=>chip(o,'#fff7ed','#c2410c')).join('')}</td></tr>`;
    if(posTests.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">+ve Tests</td><td style="padding:2px 0">${posTests.map(o=>chip('+'+o,'#fee2e2','#b91c1c')).join('')}</td></tr>`;
    if(negTests.length) cells+=`<tr><td style="padding:2px 0;font-size:9px;color:#64748b;font-weight:700;vertical-align:top">-ve Tests</td><td style="padding:2px 0;font-size:9px;color:#94a3b8">${negTests.join(', ')}</td></tr>`;

    if(cells){
      regLines+=`<div style="margin-bottom:6px;padding:6px 8px;border:1px solid #e2e8f0;border-left:3px solid #2563eb;border-radius:4px;background:#fff">
        <div style="font-size:9.5px;font-weight:700;color:#0f172a;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">${r}${side?' <span style="font-weight:400;color:#2563eb;text-transform:none">· '+side+'</span>':''}</div>
        <table style="width:100%;border-collapse:collapse">${cells}</table>
      </div>`;
    }
  });

  // Functional limitations
  const funcNames=(c.func||[]).map(i=>AFUNCTIONAL[i]).filter(Boolean);
  const funcLine=funcNames.length||c.funcOther?`<div style="margin-top:4px"><span style="font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase;margin-right:6px">Functional limitations</span>${funcNames.map(f=>chip(f,'#fef9c3','#854d0e')).join('')}${c.funcOther?chip(c.funcOther,'#fef9c3','#854d0e'):''}</div>`:'';

  const oContent=genTable+regLines+funcLine;

  // ── A · Assessment ──
  const dxBlock=c.dx?`<div style="background:#ede9fe;border-radius:4px;padding:5px 10px;margin-bottom:6px;display:flex;align-items:baseline;gap:8px"><span style="font-size:8.5px;color:#7c3aed;font-weight:700;text-transform:uppercase;white-space:nowrap">Diagnosis</span><span style="font-size:11px;font-weight:700;color:#1e3a8a">${c.dx}</span></div>`:'';

// ── Print: inject compact PDF page, print, remove ──
function assessPrint(id){
  const html=buildPDFHTML(id);if(!html)return;
  const div=document.createElement('div');
  div.id='print-only-sheet';
  div.style.cssText='position:fixed;inset:0;z-index:99999;background:#fff;overflow:hidden';
  div.innerHTML=html;
  document.body.appendChild(div);
  // hide everything else
  document.body.querySelectorAll(':scope > *:not(#print-only-sheet)').forEach(el=>el.style.display='none');
  window.print();
  document.body.querySelectorAll(':scope > *:not(#print-only-sheet)').forEach(el=>el.style.display='');
  div.remove();
}

// ── PDF: generate single-page & save to patient documents ──
async function assessSavePDF(id){
  const c=DB.assessments.find(x=>x.id===id);if(!c)return;
  const p=pById(c.pid);
  const toast=el=>{let t=document.getElementById('pdf-toast');if(!t){t=document.createElement('div');t.id='pdf-toast';t.style.cssText='position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.3)';document.body.appendChild(t);}t.innerHTML=el;t.style.display='flex';};
  toast('⏳ Generating PDF…');

  // Build hidden single-page element
  const div=document.createElement('div');
  div.style.cssText='position:fixed;left:-9999px;top:0;z-index:-1';
  div.innerHTML=buildPDFHTML(id);
  document.body.appendChild(div);
  const wrap=div.querySelector('#pdf-single-page');

  try{
    const {jsPDF}=window.jspdf;
    // Render at exactly A4 pixel width (794px @ 96dpi ≈ 210mm)
    const canvas=await html2canvas(wrap,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false,width:794,height:1123});
    div.remove();

    const imgData=canvas.toDataURL('image/png');
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    // Fill entire A4 page (210×297mm) with the image
    pdf.addImage(imgData,'PNG',0,0,210,297);

    const pdfBase64=pdf.output('datauristring');
    const fileName=`Assessment_${p.name.replace(/\s+/g,'_')}_${c.date}.pdf`;

    // Save to patient docs in DB
    if(!p.docs)p.docs=[];
    const existIdx=p.docs.findIndex(d=>d.assessId===id);
    const docEntry={n:fileName,d:c.date,assessId:id,type:'assessment-pdf',data:pdfBase64};
    if(existIdx>-1)p.docs[existIdx]=docEntry; else p.docs.push(docEntry);
    save();

    // Trigger download
    const link=document.createElement('a');
    link.href=pdfBase64;
    link.download=fileName;
    link.click();

    toast(`✅ Saved as <b>${fileName}</b> — also in patient documents`);
    setTimeout(()=>{const t=document.getElementById('pdf-toast');if(t)t.style.display='none';},4000);
  }catch(e){
    div.remove();
    console.error(e);
    toast('❌ PDF failed: '+e.message);
  }
}

// ── Start Session from assessment → creates/reuses treatment plan, opens log form ──
function startSessionFromAssess(id){
  const c=DB.assessments.find(x=>x.id===id);if(!c)return;
  // Check if a treatment plan already exists for this patient with same diagnosis
  let plan=DB.plans.find(t=>t.pid===c.pid&&t.diagnosis===c.dx&&t.done<t.sessions);
  if(!plan){
    // Create a new plan seeded from the assessment
    plan={
      id:uid("t"),
      pid:c.pid,
      diagnosis:c.dx||c.complaint||'Physiotherapy',
      goal:c.stg||c.ltg||'As per assessment',
      sessions:c.sessions||12,
      done:0,
      modalities:c.modalities||[],
      exercises:c.exercises||[],
      home:c.home||[],
      homeFreq:c.homeFreq||'',
      notes:c.advice||'',
      visits:[]
    };
    if(!DB.plans)DB.plans=[];
    DB.plans.push(plan);
    save();
  }
  // Navigate to Treatment tab and open session log
  go('treatment');
  setTimeout(()=>sessionForm(plan.id),80);
}

 <div class="modal-f"><button class="btn sec" onclick="window.print()">🖨 Print / PDF</button><button class="btn" onclick="closeModal()">Close</button></div>`,true);
  } else {
    _origPrintRx(id);
  }
};

function fillBranches(){const sel=document.getElementById("branchSel");const cur=sel.value;sel.innerHTML='<option value="all">🏥 All Branches</option>'+DB.branches.map(b=>`<option value="${b.id}">🏥 ${b.name}</option>`).join("");sel.value=cur||"b1";}
function login(role){CURROLE=role;const r=ROLES[role];MYTHER=r.scope;
 document.getElementById("login").classList.add("hide");
 document.querySelectorAll("#nav button").forEach(b=>{b.style.display=r.views.includes(b.dataset.v)?"":"none";});
 const kids=[...document.getElementById("nav").children];
 kids.forEach((el,i)=>{if(el.classList.contains("grp")){let any=false;for(let j=i+1;j<kids.length;j++){const k=kids[j];if(k.classList.contains("grp"))break;if(k.tagName==="BUTTON"&&k.style.display!=="none"){any=true;break;}}el.style.display=any?"":"none";}});
 document.getElementById("userChip").innerHTML=`<div class="avatar" style="background:${r.color}">${r.init}</div><div class="uc-text" style="line-height:1.15"><div style="font-weight:700;font-size:13px">${r.name}</div><div style="font-size:11px;color:var(--muted)">${r.title}</div></div>`;
 go(r.home);
}
function logout(){document.getElementById("login").classList.remove("hide");}
fillBranches();document.getElementById("branchSel").value="b1";
